<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הדרך של בראל - The Barel Way</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        body { font-family: 'Rubik', sans-serif; background-color: #03060f; color: white; touch-action: manipulation; }
        .bg-card { background: linear-gradient(180deg, #0b1324 0%, #060a14 100%); border: 1px solid #16243d; }
        .custom-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased select-none pb-28">

    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // טאב פעיל נוכחי
            const [activeTab, setActiveTab] = React.useState('dashboard'); // 'dashboard' | 'diary' | 'stats' | 'settings'
            
            // יעדים הניתנים לשינוי מלא בטאב הגדרות
            const [targets, setTargets] = React.useState({
                calories: 2400, protein: 210, carbs: 300, fat: 85, water: 2.5, steps: 10000
            });

            // יומן אוכל דינמי המשפיע ישירות על חישובי המאקרו והקלוריות
            const [foodDiary, setFoodDiary] = React.useState([
                { id: 1, name: 'ארוחת בוקר חלבון', calories: 500, protein: 50, carbs: 40, fat: 20, time: '08:30' },
                { id: 2, name: 'חזה עוף, אורז ושמן זית', calories: 800, protein: 80, carbs: 160, fat: 40, time: '13:15' },
                { id: 3, name: 'יוגורט חלבון עם בננה', calories: 300, protein: 30, carbs: 70, fat: 10, time: '17:00' }
            ]);

            // מדדי התקדמות יומית
            const [progress, setProgress] = React.useState({
                water: 1.8, steps: 7200, weight: 105, lastWeightTime: "היום, 19:03"
            });

            // ניהול מודאלים (חלונות צצים)
            const [modalType, setModalType] = React.useState(null); // 'addWater' | 'addSteps' | 'addWeight' | 'cameraScan'
            const [customInput, setCustomInput] = React.useState("");
            const [scanningStage, setScanningStage] = React.useState('idle'); // 'idle' | 'scanning' | 'result'
            const [scannedMeal, setScannedMeal] = React.useState(null);

            // חישוב אוטומטי של סך אבות המזון והקלוריות שנאכלו מתוך היומן
            const consumed = React.useMemo(() => {
                return foodDiary.reduce((acc, item) => ({
                    calories: acc.calories + item.calories,
                    protein: acc.protein + item.protein,
                    carbs: acc.carbs + item.carbs,
                    fat: acc.fat + item.fat
                }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
            }, [foodDiary]);

            // פונקציה לקביעת ברכת שלום מותאמת לשעה ביום
            const getGreeting = () => {
                const hour = new Date().getHours();
                if (hour >= 5 && hour < 12) return "בוקר טוב";
                if (hour >= 12 && hour < 17) return "צהריים טובים";
                if (hour >= 17 && hour < 22) return "ערב טוב";
                return "לילה טוב";
            };

            const calPercent = Math.min((consumed.calories / targets.calories) * 100, 100);
            const waterPercent = Math.min((progress.water / targets.water) * 100, 100);
            const stepsPercent = Math.min((progress.steps / targets.steps) * 100, 100);

            // הפעלת סימולציית סריקת מצלמה חכמה
            const triggerCameraScan = () => {
                setScanningStage('scanning');
                setTimeout(() => {
                    // מדמה תוצאה שחזרת מסריקת תמונה של האוכל
                    setScannedMeal({
                        name: 'סלט עוף מועשר בחלבון (סריקת AI 📸)',
                        calories: 420, protein: 38, carbs: 15, fat: 12
                    });
                    setScanningStage('result');
                }, 2000);
            };

            const saveScannedMeal = () => {
                if (scannedMeal) {
                    const timeNow = new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
                    setFoodDiary([...foodDiary, { id: Date.now(), ...scannedMeal, time: timeNow }]);
                }
                setModalType(null);
                setScanningStage('idle');
                setScannedMeal(null);
            };

            return (
                <div className="max-w-md mx-auto px-4 pt-4 pb-24 space-y-4">
                    
                    {/* Header עליון דינמי - מתעדכן לפי שעות היום */}
                    <div className="flex justify-between items-center py-2">
                        <div className="w-8 h-8 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-xs shadow-inner cursor-pointer">👤</div>
                        <div className="flex items-center gap-2">
                            <div className="relative">
                                <span className="text-xl text-gray-400">🔔</span>
                                <span className="absolute top-0 right-0 w-2 h-2 bg-lime-500 rounded-full"></span>
                            </div>
                        </div>
                        <div className="text-center flex-1">
                            <h1 className="text-base font-bold text-gray-100 tracking-wide">{getGreeting()}, בראל 👋</h1>
                            <p className="text-[10px] text-gray-500 font-mono mt-0.5">26 ביוני 2026</p>
                        </div>
                        <button className="text-gray-400 text-2xl p-1" onClick={() => setActiveTab('settings')}>☰</button>
                    </div>

                    {/* ניווט בין מסכים עליון/מרכזי בהתאם לטאב הנבחר */}
                    {activeTab === 'dashboard' && (
                        <>
                            {/* פאנל מאקרו-נוטריאנטים משולב חצי-חצי בדיוק כמו בתמונה */}
                            <div className="bg-card rounded-2xl p-4 shadow-2xl flex items-center justify-between gap-2">
                                <div className="w-1/2 space-y-2.5 pr-2">
                                    <div className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">מאקרו-נוטריאנטים</div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-medium"><span className="text-gray-300">🧪 חלבון</span><span className="text-gray-400">{consumed.protein}/{targets.protein}g</span></div>
                                        <div className="w-full bg-slate-900 h-1.5 rounded-full"><div className="bg-lime-500 h-full rounded-full transition-all" style={{ width: `${(consumed.protein/targets.protein)*100}%` }}></div></div>
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-medium"><span className="text-gray-300">🌾 פחמימות</span><span className="text-gray-400">{consumed.carbs}/{targets.carbs}g</span></div>
                                        <div className="w-full bg-slate-900 h-1.5 rounded-full"><div className="bg-cyan-500 h-full rounded-full transition-all" style={{ width: `${(consumed.carbs/targets.carbs)*100}%` }}></div></div>
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-medium"><span className="text-gray-300">🔥 שומן</span><span className="text-gray-400">{consumed.fat}/{targets.fat}g</span></div>
                                        <div className="w-full bg-slate-900 h-1.5 rounded-full"><div className="bg-orange-500 h-full rounded-full transition-all" style={{ width: `${(consumed.fat/targets.fat)*100}%` }}></div></div>
                                    </div>
                                    <div className="inline-block bg-slate-950/80 px-2 py-0.5 rounded-full border border-slate-800 text-[9px] text-emerald-400 font-bold">↗ 120- קל' מאתמול</div>
                                </div>

                                <div className="w-1/2 flex flex-col items-center justify-center border-r border-slate-800/80 pl-2">
                                    <div className="relative w-28 h-28 flex flex-col items-center justify-center">
                                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                                            <circle cx="50" cy="50" r="40" stroke="#0e1624" strokeWidth="6" fill="transparent" />
                                            <circle cx="50" cy="50" r="40" stroke="#84cc16" strokeWidth="6" fill="transparent" 
                                                    strokeDasharray="251.2" strokeDashoffset={251.2 - (251.2 * calPercent) / 100} strokeLinecap="round" />
                                        </svg>
                                        <div className="absolute flex flex-col items-center justify-center">
                                            <span className="text-[9px] text-gray-400 font-bold tracking-wider">🔥 קלוריות</span>
                                            <span className="text-xl font-black font-mono tracking-tight">{consumed.calories.toLocaleString()}</span>
                                            <span className="text-[9px] text-gray-500">/ {targets.calories} קק"ל</span>
                                        </div>
                                    </div>
                                    <p className="text-[9px] text-gray-400 mt-2 font-medium text-center">
                                        {targets.calories - consumed.calories > 0 ? `נותרו לך ${targets.calories - consumed.calories} קק"ל ליעד` : 'עמדת ביעד הקלוריות בהצלחה!'}
                                    </p>
                                </div>
                            </div>

                            {/* גריד מדדי ההתקדמות (משקל, צעדים, מים) - לחיצים לחלוטין לצורך עדכון התקדמות */}
                            <div className="grid grid-cols-3 gap-3">
                                <div className="bg-card rounded-2xl p-3 flex flex-col justify-between cursor-pointer active:scale-95 transition-transform" onClick={() => setModalType('addWeight')}>
                                    <div className="flex justify-between w-full items-center text-[10px] text-gray-400"><span>משקל</span><span>⚖️</span></div>
                                    <div className="my-2">
                                        <div className="bg-slate-950/60 border border-slate-800/80 p-1.5 rounded-xl text-center shadow-inner">
                                            <p className="text-sm font-black text-purple-400 font-mono">{progress.weight} <span className="text-[8px] font-normal text-gray-400">ק"ג</span></p>
                                        </div>
                                        <p className="text-[6.5px] text-gray-500 mt-1 text-center font-medium">שקילה אחרונה: {progress.lastWeightTime}</p>
                                    </div>
                                    <div className="h-10 w-full bg-slate-950/40 rounded-lg border border-slate-900/60 overflow-hidden relative pt-2">
                                        <svg className="w-full h-full" viewBox="0 0 100 40">
                                            <path d="M0 15 Q25 10 50 22 T100 32" fill="none" stroke="#a855f7" strokeWidth="2" />
                                            <circle cx="50" cy="22" r="2.5" fill="#fff" />
                                        </svg>
                                    </div>
                                </div>

                                <div className="bg-card rounded-2xl p-3 flex flex-col justify-between cursor-pointer active:scale-95 transition-transform" onClick={() => setModalType('addSteps')}>
                                    <div className="flex justify-between w-full items-center text-[10px] text-gray-400"><span>צעדים</span><span>👟</span></div>
                                    <div className="my-2">
                                        <p className="text-base font-black text-lime-400 font-mono">{progress.steps.toLocaleString()}</p>
                                        <p className="text-[9px] text-gray-500">{Math.round(stepsPercent)}% מהיעד</p>
                                    </div>
                                    <div className="flex items-end justify-between h-12 pt-2 px-1 bg-slate-950/40 rounded-lg border border-slate-900/60">
                                        {[40, 60, 35, 75, 90, 50, 65].map((h, i) => (
                                            <div key={i} className="w-[3px] bg-lime-500 rounded-t" style={{ height: `${h}%` }}></div>
                                        ))}
                                    </div>
                                    <div className="flex justify-between text-[7px] text-gray-600 mt-1 font-mono"><span>00:00</span><span>12:00</span></div>
                                </div>

                                <div className="bg-card rounded-2xl p-3 flex flex-col justify-between items-center cursor-pointer active:scale-95 transition-transform" onClick={() => setModalType('addWater')}>
                                    <div className="flex justify-between w-full items-center text-[10px] text-gray-400"><span>מים</span><span>💧</span></div>
                                    <div className="my-2 text-center">
                                        <p className="text-sm font-black text-cyan-400 font-mono">{progress.water.toFixed(1)} / {targets.water}</p>
                                        <p className="text-[9px] text-gray-500">ליטר ({Math.round(waterPercent)}%)</p>
                                    </div>
                                    <div className="w-10 h-20 border border-slate-700 rounded-t-lg rounded-b-md relative overflow-hidden bg-slate-950/80 shadow-inner">
                                        <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-cyan-600 to-cyan-400 transition-all duration-500" style={{ height: `${waterPercent}%` }}>
                                            <div className="w-full h-1 bg-white/40 absolute top-0 blur-[1px]"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* כפתור הוספת מזון באמצעות צילום / קרוסלה מהירה */}
                            <div className="bg-card rounded-2xl p-4 flex items-center justify-between gap-4">
                                <div className="flex items-center gap-3 cursor-pointer" onClick={() => setModalType('cameraScan')}>
                                    <div className="w-10 h-10 rounded-full bg-lime-500/20 border border-lime-500/40 flex items-center justify-center text-lime-400 font-bold text-xl shadow-lg shadow-lime-500/10">+</div>
                                    <div>
                                        <h3 className="text-xs font-bold text-gray-100">+ הוסף אוכל בצילום</h3>
                                        <p className="text-[9px] text-gray-500">ניתוח מנה באמצעות AI 📸</p>
                                    </div>
                                </div>
                                <div className="flex gap-2 overflow-x-auto custom-scrollbar pl-1">
                                    <div className="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-sm shadow-inner cursor-pointer" onClick={() => setFoodDiary([...foodDiary, { id: Date.now(), name: 'חלבון מהיר (בננה)', calories: 105, protein: 1, carbs: 27, fat: 0, time: 'עכשיו' }])}>🍌</div>
                                    <div className="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-sm shadow-inner cursor-pointer" onClick={() => setFoodDiary([...foodDiary, { id: Date.now(), name: 'חלבון מהיר (עוף)', calories: 220, protein: 45, carbs: 0, fat: 4, time: 'עכשיו' }])}>🍗</div>
                                    <div className="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-xs text-gray-500 font-bold">•••</div>
                                </div>
                            </div>

                            {/* פאנל יעד תחתון ארוך */}
                            <div className="bg-card rounded-2xl p-4 flex flex-col gap-2">
                                <div className="flex justify-between items-center text-xs">
                                    <div className="flex items-center gap-2"><span>🎯</span><span className="font-bold">יעד יומי</span></div>
                                    <span className="text-gray-400 text-[10px]">סך הכל התקדמות קלורית</span>
                                </div>
                                <div className="w-full bg-slate-950 h-2.5 rounded-full p-0.5 border border-slate-900">
                                    <div className="bg-gradient-to-r from-rose-500 to-pink-500 h-full rounded-full transition-all duration-300" style={{ width: `${calPercent}%` }}></div>
                                </div>
                            </div>
                        </>
                    )}

                    {/* מסך 2: יומן אוכל מתפקד ומחובר למדדים הראשיים */}
                    {activeTab === 'diary' && (
                        <div className="space-y-4">
                            <div className="bg-card rounded-2xl p-4">
                                <h2 className="text-sm font-bold border-b border-slate-800 pb-2 mb-3 text-lime-400">📝 יומן ארוחות יומי (מחובר למדדי ה-Dashboard)</h2>
                                <div className="space-y-3">
                                    {foodDiary.map(item => (
                                        <div key={item.id} className="flex justify-between items-center bg-slate-950/60 p-3 rounded-xl border border-slate-900">
                                            <div>
                                                <p className="text-xs font-bold">{item.name}</p>
                                                <p className="text-[9px] text-gray-400">חלבון: {item.protein}g | פחמימות: {item.carbs}g | שומן: {item.fat}g</p>
                                                <span className="text-[8px] text-gray-600 font-mono">{item.time}</span>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className="text-xs font-bold text-gray-200 font-mono">{item.calories} קק"ל</span>
                                                <button className="text-red-400 text-xs font-bold px-2 py-1 bg-red-500/10 rounded-lg hover:bg-red-500/20" onClick={() => setFoodDiary(foodDiary.filter(f => f.id !== item.id))}>מחק</button>
                                            </div>
                                        </div>
                                    ))}
                                    {foodDiary.length === 0 && <p className="text-center text-xs text-gray-500 py-4">לא נמצאו מזונות מתועדים להיום.</p>}
                                </div>
                                <div className="mt-4 pt-3 border-t border-slate-800 flex justify-between text-xs font-bold text-gray-300">
                                    <span>סה"כ שנאכל היום:</span>
                                    <span className="text-lime-400">{consumed.calories} קק"ל</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* מסך 3: סטטיסטיקות */}
                    {activeTab === 'stats' && (
                        <div className="bg-card rounded-2xl p-4 space-y-4">
                            <h2 className="text-sm font-bold border-b border-slate-800 pb-2 text-purple-400">📈 גרפי מגמה וסטטיסטיקות שבועיות</h2>
                            <div className="space-y-4">
                                <div>
                                    <p className="text-[10px] text-gray-400 mb-1">עמידה ביעדי קלוריות (7 ימים אחרונים)</p>
                                    <div className="h-24 flex items-end justify-between bg-slate-950/60 p-2 rounded-xl border border-slate-900">
                                        {[85, 90, 100, 70, 95, 60, calPercent].map((w, i) => (
                                            <div key={i} className="w-8 bg-gradient-to-t from-lime-600 to-lime-400 rounded-t text-[8px] text-center pb-1 text-black font-bold font-mono" style={{ height: `${Math.min(w, 100)}%` }}>{i === 6 ? 'היום' : `יום ${i+1}`}</div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-slate-950/40 border border-slate-900 p-3 rounded-xl text-center">
                                    <p className="text-xs font-bold text-gray-200">גרף ירידה במשקל שבועי</p>
                                    <p className="text-[10px] text-gray-500 mt-1">מגמה נוכחית: ירידה מתונה יציבה</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* מסך 4: הגדרות לקביעת יעדים אישיים */}
                    {activeTab === 'settings' && (
                        <div className="bg-card rounded-2xl p-4 space-y-4">
                            <h2 className="text-sm font-bold border-b border-slate-800 pb-2 text-cyan-400">⚙️ הגדרת יעדים אישיים (משפיע על ה-Dashboard)</h2>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400">יעד קלוריות יומי</label>
                                    <input type="number" value={targets.calories} onChange={e => setTargets({...targets, calories: parseInt(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-center text-xs font-mono font-bold text-lime-400 focus:outline-none"/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400">יעד חלבון (גרם)</label>
                                    <input type="number" value={targets.protein} onChange={e => setTargets({...targets, protein: parseInt(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-center text-xs font-mono font-bold text-lime-400 focus:outline-none"/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400">יעד פחמימות (גרם)</label>
                                    <input type="number" value={targets.carbs} onChange={e => setTargets({...targets, carbs: parseInt(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-center text-xs font-mono font-bold text-cyan-400 focus:outline-none"/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400">יעד שומן (גרם)</label>
                                    <input type="number" value={targets.fat} onChange={e => setTargets({...targets, fat: parseInt(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-center text-xs font-mono font-bold text-orange-400 focus:outline-none"/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400">יעד צריכת מים (ליטר)</label>
                                    <input type="number" step="0.1" value={targets.water} onChange={e => setTargets({...targets, water: parseFloat(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-center text-xs font-mono font-bold text-cyan-400 focus:outline-none"/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400">יעד צעדים יומי</label>
                                    <input type="number" value={targets.steps} onChange={e => setTargets({...targets, steps: parseInt(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-center text-xs font-mono font-bold text-lime-400 focus:outline-none"/>
                                </div>
                            </div>
                            <p className="text-[9px] text-gray-500 text-center pt-2">כל שינוי בערכים הללו יעדכן את תרשימי הטבעת והעמודות באופן מיידי.</p>
                        </div>
                    )}

                    {/* חלונות מודאל אינטראקטיביים לעדכון התקדמות אמיתית */}
                    {modalType && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-end justify-center z-50 p-4" onClick={() => setModalType(null)}>
                            <div className="bg-[#0b1324] border border-[#16243d] rounded-t-3xl p-6 w-full max-w-md space-y-4 shadow-2xl" onClick={e => e.stopPropagation()}>
                                
                                {modalType === 'addWater' && (
                                    <>
                                        <h3 className="text-sm font-bold text-gray-200 border-b border-slate-800 pb-2">💧 תיעוד צריכת מים</h3>
                                        <div className="grid grid-cols-3 gap-2">
                                            <button onClick={() => { setProgress({...progress, water: progress.water + 0.25}); setModalType(null); }} className="bg-slate-950 p-2.5 rounded-xl border border-slate-800 text-xs font-bold text-cyan-400">+ 250 מ"ל</button>
                                            <button onClick={() => { setProgress({...progress, water: progress.water + 0.5}); setModalType(null); }} className="bg-slate-950 p-2.5 rounded-xl border border-slate-800 text-xs font-bold text-cyan-400">+ 500 מ"ל</button>
                                            <button onClick={() => { setProgress({...progress, water: progress.water + 0.75}); setModalType(null); }} className="bg-slate-950 p-2.5 rounded-xl border border-slate-800 text-xs font-bold text-cyan-400">+ 750 מ"ל</button>
                                        </div>
                                    </>
                                )}

                                {modalType === 'addSteps' && (
                                    <>
                                        <h3 className="text-sm font-bold text-gray-200 border-b border-slate-800 pb-2">👟 הוספת צעדים שביצעת</h3>
                                        <input type="number" placeholder="כמה צעדים להוסיף?" value={customInput} onChange={e => setCustomInput(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-center text-base font-bold text-lime-400 focus:outline-none"/>
                                        <button onClick={() => { if(parseInt(customInput)){ setProgress({...progress, steps: progress.steps + parseInt(customInput)}); } setCustomInput(""); setModalType(null); }} className="w-full bg-lime-500 py-2.5 rounded-xl text-black font-bold text-xs">עדכן צעדים</button>
                                    </>
                                )}

                                {modalType === 'addWeight' && (
                                    <>
                                        <h3 className="text-sm font-bold text-gray-200 border-b border-slate-800 pb-2">⚖️ עדכון שקילה חדשה</h3>
                                        <input type="number" step="0.1" placeholder="הזן משקל נוכחי בק"ג" value={customInput} onChange={e => setCustomInput(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-center text-base font-bold text-purple-400 focus:outline-none"/>
                                        <button onClick={() => { if(parseFloat(customInput)){ const timeNow = new Date().toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'}); setProgress({...progress, weight: parseFloat(customInput), lastWeightTime: `היום, ${timeNow}`}); } setCustomInput(""); setModalType(null); }} className="w-full bg-purple-500 py-2.5 rounded-xl text-white font-bold text-xs">שמור שקילה מעודכנת</button>
                                    </>
                                )}

                                {modalType === 'cameraScan' && (
                                    <div className="space-y-4 text-center">
                                        <h3 className="text-sm font-bold text-gray-200 border-b border-slate-800 pb-2">📸 סורק ארוחות חכם - AI Vision</h3>
                                        {scanningStage === 'idle' && (
                                            <div className="py-6 space-y-3">
                                                <div className="w-20 h-20 bg-lime-500/10 border-2 border-dashed border-lime-500/40 rounded-full flex items-center justify-center mx-auto text-2xl">📷</div>
                                                <p className="text-xs text-gray-400">צלם את הארוחה שלך או העלה קובץ תמונה לניתוח מהיר</p>
                                                <button onClick={triggerCameraScan} className="bg-lime-500 text-black font-bold text-xs px-4 py-2 rounded-xl">שמץ צילום ארוחה</button>
                                            </div>
                                        )}
                                        {scanningStage === 'scanning' && (
                                            <div className="py-8 space-y-2">
                                                <div className="w-8 h-8 border-4 border-lime-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                                                <p className="text-xs text-lime-400 font-medium">ה-AI מנתח את הרכב המנה והנפח הוויזואלי...</p>
                                            </div>
                                        )}
                                        {scanningStage === 'result' && scannedMeal && (
                                            <div className="bg-slate-950 p-4 rounded-xl text-right space-y-2 border border-slate-900">
                                                <p className="text-xs font-bold text-lime-400">🔍 המנה זוהתה בהצלחה!</p>
                                                <p className="text-sm font-bold text-white">{scannedMeal.name}</p>
                                                <div className="grid grid-cols-4 gap-1 text-center text-[10px] bg-slate-900 p-2 rounded-lg mt-2">
                                                    <div><p className="text-gray-400">קלוריות</p><p className="font-bold font-mono">{scannedMeal.calories}</p></div>
                                                    <div><p className="text-gray-400">חלבון</p><p className="font-bold font-mono text-lime-400">{scannedMeal.protein}g</p></div>
                                                    <div><p className="text-gray-400">פחמימות</p><p className="font-bold font-mono text-cyan-400">{scannedMeal.carbs}g</p></div>
                                                    <div><p className="text-gray-400">שומן</p><p className="font-bold font-mono text-orange-400">{scannedMeal.fat}g</p></div>
                                                </div>
                                                <div className="flex gap-2 pt-2">
                                                    <button onClick={saveScannedMeal} className="flex-1 bg-lime-500 text-black font-bold text-xs py-2 rounded-lg">אישור והוספה ליומן</button>
                                                    <button onClick={() => setScanningStage('idle')} className="bg-slate-800 text-gray-300 text-xs px-3 py-2 rounded-lg">נסה שוב</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                            </div>
                        </div>
                    )}

                    {/* בר ניווט תחתון קבוע ואינטראקטיבי - תואם במדויק ל-image_4.png */}
                    <div className="fixed bottom-0 left-0 right-0 bg-[#070b14]/95 backdrop-blur-md border-t border-[#16243d] py-2 px-6 z-40">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div className={`flex flex-col items-center cursor-pointer transition-colors ${activeTab === 'settings' ? 'text-lime-400' : 'text-gray-500'}`} onClick={() => setActiveTab('settings')}>
                                <span className="text-lg">⚙️</span><span className="text-[8px] font-bold mt-0.5">הגדרות</span>
                            </div>
                            <div className={`flex flex-col items-center cursor-pointer transition-colors ${activeTab === 'stats' ? 'text-lime-400' : 'text-gray-500'}`} onClick={() => setActiveTab('stats')}>
                                <span className="text-lg">📈</span><span className="text-[8px] font-bold mt-0.5">סטטיסטיקות</span>
                            </div>
                            <div className="w-12 h-12 bg-gradient-to-tr from-lime-500 to-emerald-400 rounded-full flex items-center justify-center text-black font-black text-xl shadow-lg shadow-lime-500/30 -mt-5 cursor-pointer transform active:scale-90 transition-transform" onClick={() => setModalType('cameraScan')}>+</div>
                            <div className={`flex flex-col items-center cursor-pointer transition-colors ${activeTab === 'diary' ? 'text-lime-400' : 'text-gray-500'}`} onClick={() => setActiveTab('diary')}>
                                <span className="text-lg">4️⃣9️⃣</span><span className="text-[8px] font-bold mt-0.5">יומן אוכל</span>
                            </div>
                            <div className={`flex flex-col items-center cursor-pointer transition-colors ${activeTab === 'dashboard' ? 'text-lime-400' : 'text-gray-500'}`} onClick={() => setActiveTab('dashboard')}>
                                <span className="text-lg">📊</span><span className="text-[8px] font-bold mt-0.5">דאשבורד</span>
                            </div>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
