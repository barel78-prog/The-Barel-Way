<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הדרך של בראל - The Barel Way</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- React 18 & @babel/standalone הגרסה המודרנית למניעת מסך שחור -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Rubik', sans-serif; background-color: #03060f; color: white; touch-action: manipulation; }
        .bg-card { background: linear-gradient(180deg, #0b1324 0%, #060a14 100%); border: 1px solid #16243d; }
        .custom-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased select-none pb-28">

    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // ניהול הטאב הפעיל באפליקציה
            const [activeTab, setActiveTab] = React.useState('dashboard'); 
            
            // יעדים הניתנים לשינוי מלא מתוך מסך ההגדרות
            const [targets, setTargets] = React.useState({
                calories: 2400, protein: 210, carbs: 300, fat: 85, water: 2.5, steps: 10000
            });

            // יומן האוכל הראשי - כל המדדים בדאשבורד מחושבים דינמית ממנו
            const [foodDiary, setFoodDiary] = React.useState([
                { id: 1, name: 'חזה עוף מבושל ואורז לבן', calories: 900, protein: 90, carbs: 100, fat: 15, time: '13:15' },
                { id: 2, name: 'שייק חלבון ויוגורט פרו', calories: 400, protein: 50, carbs: 20, fat: 5, time: '16:45' },
                { id: 3, name: 'חטיף חלבון וחופן שקדים', calories: 300, protein: 20, carbs: 20, fat: 10, time: '18:30' }
            ]);

            // מדדי התקדמות המים, הצעדים והמשקל
            const [progress, setProgress] = React.useState({
                water: 1.8, steps: 7200, weight: 105, lastWeightTime: "היום, 19:03"
            });

            // ניהול חלוניות הזנה (Modals)
            const [modalType, setModalType] = React.useState(null); // 'addWater' | 'addSteps' | 'addWeight' | 'cameraScan'
            const [inputValue, setInputValue] = React.useState("");
            const [scanStatus, setScanStatus] = React.useState('idle'); // 'idle' | 'loading' | 'done'
            const [detectedFood, setDetectedFood] = React.useState(null);

            // חישוב אוטומטי ודינמי של אבות המזון והקלוריות מתוך היומן בלבד
            const totals = React.useMemo(() => {
                return foodDiary.reduce((acc, item) => {
                    acc.calories += item.calories;
                    acc.protein += item.protein;
                    acc.carbs += item.carbs;
                    acc.fat += item.fat;
                    return acc;
                }, { calories: 0, protein: 0, carbs: 0, fat: 0 });
            }, [foodDiary]);

            // פונקציית ברכת שלום חכמה המתעדכנת לפי השעה האמיתית ביום
            const getDynamicGreeting = () => {
                const hour = new Date().getHours();
                if (hour >= 5 && hour < 12) return "בוקר טוב";
                if (hour >= 12 && hour < 17) return "צהריים טובים";
                if (hour >= 17 && hour < 22) return "ערב טוב";
                return "לילה טוב";
            };

            const calPercent = Math.min((totals.calories / targets.calories) * 100, 100);
            const waterPercent = Math.min((progress.water / targets.water) * 100, 100);
            const stepsPercent = Math.min((progress.steps / targets.steps) * 100, 100);

            // סימולציית מצלמת AI לצילום המזון
            const handleCameraCapture = () => {
                setScanStatus('loading');
                setTimeout(() => {
                    setDetectedFood({
                        name: 'דג סלמון בתנור עם בטטה (נותח בצילום 📸)',
                        calories: 550, protein: 42, carbs: 35, fat: 18
                    });
                    setScanStatus('done');
                }, 1800);
            };

            const addScannedToDiary = () => {
                if (detectedFood) {
                    const currentTime = new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
                    setFoodDiary([...foodDiary, { id: Date.now(), ...detectedFood, time: currentTime }]);
                }
                setModalType(null);
                setScanStatus('idle');
                setDetectedFood(null);
            };

            return (
                <div className="max-w-md mx-auto px-4 pt-4 pb-24 space-y-4">
                    
                    {/* Header העליון המדויק מתוך image_3.png */}
                    <div className="flex justify-between items-center py-2">
                        <div className="w-8 h-8 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-xs shadow-inner cursor-pointer" onClick={() => setActiveTab('settings')}>👤</div>
                        <div className="flex items-center gap-2">
                            <div className="relative">
                                <span className="text-xl text-gray-400">🔔</span>
                                <span className="absolute top-0 right-0 w-2 h-2 bg-lime-500 rounded-full"></span>
                            </div>
                        </div>
                        <div className="text-center flex-1">
                            <h1 className="text-base font-bold text-gray-100 tracking-wide">{getDynamicGreeting()}, בראל 👋</h1>
                            <p className="text-[10px] text-gray-500 font-mono mt-0.5">26 ביוני 2026</p>
                        </div>
                        <button className="text-gray-400 text-2xl p-1" onClick={() => setActiveTab('settings')}>☰</button>
                    </div>

                    {/* מסך 1: דאשבורד ראשי */}
                    {activeTab === 'dashboard' && (
                        <>
                            {/* כרטיס המאקרו והטבעת המרכזית */}
                            <div className="bg-card rounded-2xl p-4 shadow-2xl flex items-center justify-between gap-2">
                                <div className="w-1/2 space-y-2.5 pr-2">
                                    <div className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">מאקרו-נוטריאנטים</div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-medium"><span className="text-gray-300">🧪 חלבון</span><span className="text-gray-400">{totals.protein}/{targets.protein}g</span></div>
                                        <div className="w-full bg-slate-900 h-1.5 rounded-full"><div className="bg-lime-500 h-full rounded-full transition-all" style={{ width: `${(totals.protein/targets.protein)*100}%` }}></div></div>
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-medium"><span className="text-gray-300">🌾 פחמימות</span><span className="text-gray-400">{totals.carbs}/{targets.carbs}g</span></div>
                                        <div className="w-full bg-slate-900 h-1.5 rounded-full"><div className="bg-cyan-500 h-full rounded-full transition-all" style={{ width: `${(totals.carbs/targets.carbs)*100}%` }}></div></div>
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-medium"><span className="text-gray-300">🔥 שומן</span><span className="text-gray-400">{totals.fat}/{targets.fat}g</span></div>
                                        <div className="w-full bg-slate-900 h-1.5 rounded-full"><div className="bg-orange-500 h-full rounded-full transition-all" style={{ width: `${(totals.fat/targets.fat)*100}%` }}></div></div>
                                    </div>
                                    <div className="inline-block bg-slate-950/80 px-2 py-0.5 rounded-full border border-slate-800 text-[9px] text-emerald-400 font-bold">↗ 120- קל' מאתמול</div>
                                </div>

                                <div className="w-1/2 flex flex-col items-center justify-center border-r border-slate-800/80 pl-2">
                                    <div className="relative w-28 h-28 flex flex-col items-center justify-center">
                                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                                            <circle cx="50" cy="50" r="40" stroke="#0e1624" strokeWidth="6" fill="transparent" />
                                            <circle cx="50" cy="50" r="40" stroke="#84cc16" strokeWidth="6" fill="transparent" 
                                                    strokeDasharray="251.2" strokeDashoffset={251.2 - (251.2 * calPercent) / 100} strokeLinecap="round" />
                                        </svg>
                                        <div className="absolute flex flex-col items-center justify-center">
                                            <span className="text-[9px] text-gray-400 font-bold tracking-wider">🔥 קלוריות</span>
                                            <span className="text-xl font-black font-mono tracking-tight">{totals.calories.toLocaleString()}</span>
                                            <span className="text-[9px] text-gray-500">/ {targets.calories} קק"ל</span>
                                        </div>
                                    </div>
                                    <p className="text-[9px] text-gray-400 mt-2 font-medium text-center">
                                        {targets.calories - totals.calories > 0 ? `נותרו לך ${targets.calories - totals.calories} קק"ל ליעד` : 'הגעת אל היעד הקלורי!'}
                                    </p>
                                </div>
                            </div>

                            {/* גריד התקדמות מים, צעדים ומשקל - לחיצים לחלוטין להוספת ערכים */}
                            <div className="grid grid-cols-3 gap-3">
                                
                                {/* כרטיס משקל */}
                                <div className="bg-card rounded-2xl p-3 flex flex-col justify-between cursor-pointer active:scale-95 transition-transform" onClick={() => setModalType('addWeight')}>
                                    <div className="flex justify-between w-full items-center text-[10px] text-gray-400"><span>משקל</span><span>⚖️</span></div>
                                    <div className="my-2">
                                        <div className="bg-slate-950/60 border border-slate-800/80 p-1.5 rounded-xl text-center shadow-inner">
                                            <p className="text-sm font-black text-purple-400 font-mono">{progress.weight} <span className="text-[8px] font-normal text-gray-400">ק"ג</span></p>
                                        </div>
                                        <p className="text-[6.5px] text-gray-500 mt-1 text-center font-medium">שקילה אחרונה: {progress.lastWeightTime}</p>
                                    </div>
                                    <div className="h-10 w-full bg-slate-950/40 rounded-lg border border-slate-900/60 overflow-hidden relative pt-2">
                                        <svg className="w-full h-full" viewBox="0 0 100 40">
                                            <path d="M0 20 Q25 15 50 25 T100 35" fill="none" stroke="#a855f7" strokeWidth="2" />
                                            <circle cx="50" cy="25" r="2.5" fill="#fff" />
                                        </svg>
                                    </div>
                                </div>

                                {/* כרטיס צעדים - לחיצה עליו מוסיפה צעדים שביצעת */}
                                <div className="bg-card rounded-2xl p-3 flex flex-col justify-between cursor-pointer active:scale-95 transition-transform" onClick={() => setModalType('addSteps')}>
                                    <div className="flex justify-between w-full items-center text-[10px] text-gray-400"><span>צעדים</span><span>👟</span></div>
                                    <div className="my-2">
                                        <p className="text-base font-black text-lime-400 font-mono">{progress.steps.toLocaleString()}</p>
                                        <p className="text-[9px] text-gray-500">{Math.round(stepsPercent)}% מהיעד</p>
                                    </div>
                                    <div className="flex items-end justify-between h-12 pt-2 px-1 bg-slate-950/40 rounded-lg border border-slate-900/60">
                                        {[40, 60, 35, 75, 90, 50, 65].map((h, i) => (
                                            <div key={i} className="w-[3px] bg-lime-500 rounded-t" style={{ height: `${h}%` }}></div>
                                        ))}
                                    </div>
                                    <div className="flex justify-between text-[7px] text-gray-600 mt-1 font-mono"><span>00:00</span><span>12:00</span></div>
                                </div>

                                {/* כרטיס מים - לחיצה עליו מוסיפה מים ששתית */}
                                <div className="bg-card rounded-2xl p-3 flex flex-col justify-between items-center cursor-pointer active:scale-95 transition-transform" onClick={() => setModalType('addWater')}>
                                    <div className="flex justify-between w-full items-center text-[10px] text-gray-400"><span>מים</span><span>💧</span></div>
                                    <div className="my-2 text-center">
                                        <p className="text-sm font-black text-cyan-400 font-mono">{progress.water.toFixed(1)} / {targets.water}</p>
                                        <p className="text-[9px] text-gray-500">ליטר ({Math.round(waterPercent)}%)</p>
                                    </div>
                                    <div className="w-10 h-20 border border-slate-700 rounded-t-lg rounded-b-md relative overflow-hidden bg-slate-950/80 shadow-inner">
                                        <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-cyan-600 to-cyan-400 transition-all duration-500" style={{ height: `${waterPercent}%` }}>
                                            <div className="w-full h-1 bg-white/40 absolute top-0 blur-[1px]"></div>
                                        </div>
                                    </div>
                                </div>

                            </div>

                            {/* שורת הוספת אוכל מהירה ומצלמת AI */}
                            <div className="bg-card rounded-2xl p-4 flex items-center justify-between gap-4">
                                <div className="flex items-center gap-3 cursor-pointer" onClick={() => setModalType('cameraScan')}>
                                    <div className="w-10 h-10 rounded-full bg-lime-500/20 border border-lime-500/40 flex items-center justify-center text-lime-400 font-bold text-xl shadow-lg shadow-lime-500/10">+</div>
                                    <div>
                                        <h3 className="text-xs font-bold text-gray-100">+ הוסף אוכל בצילום</h3>
                                        <p className="text-[9px] text-gray-500">ניתוח רכיבים תזונתיים ב-AI 📸</p>
                                    </div>
                                </div>
                                <div className="flex gap-2 overflow-x-auto custom-scrollbar pl-1">
                                    <div className="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-sm shadow-inner cursor-pointer" onClick={() => setFoodDiary([...foodDiary, { id: Date.now(), name: 'תוספת בננה', calories: 105, protein: 1, carbs: 27, fat: 0, time: 'עכשיו' }])}>🍌</div>
                                    <div className="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-sm shadow-inner cursor-pointer" onClick={() => setFoodDiary([...foodDiary, { id: Date.now(), name: 'תוספת חזה עוף', calories: 220, protein: 45, carbs: 0, fat: 4, time: 'עכשיו' }])}>🍗</div>
                                    <div className="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-xs text-gray-500 font-bold">•••</div>
                                </div>
                            </div>

                            {/* מד התקדמות יעד תחתון */}
                            <div className="bg-card rounded-2xl p-4 flex flex-col gap-2">
                                <div className="flex justify-between items-center text-xs">
                                    <div className="flex items-center gap-2"><span>🎯</span><span className="font-bold">יעד יומי קלורי</span></div>
                                    <span className="text-gray-400 text-[10px]">עוד {targets.calories - totals.calories > 0 ? targets.calories - totals.calories : 0} קק"ל</span>
                                </div>
                                <div className="w-full bg-slate-950 h-2.5 rounded-full p-0.5 border border-slate-900">
                                    <div className="bg-gradient-to-r from-rose-500 to-pink-500 h-full rounded-full transition-all duration-300" style={{ width: `${calPercent}%` }}></div>
                                </div>
                            </div>
                        </>
                    )}

                    {/* מסך 2: יומן אוכל - תיעוד של מה שנאכל במהלך היום */}
                    {activeTab === 'diary' && (
                        <div className="bg-card rounded-2xl p-4 space-y-4">
                            <h2 className="text-sm font-bold border-b border-slate-800 pb-2 text-lime-400">📝 יומן ארוחות ותיעוד יומי</h2>
                            <div className="space-y-3">
                                {foodDiary.map(item => (
                                    <div key={item.id} className="flex justify-between items-center bg-slate-950/60 p-3 rounded-xl border border-slate-900">
                                        <div>
                                            <p className="text-xs font-bold text-gray-200">{item.name}</p>
                                            <p className="text-[9px] text-gray-400">חלבון: {item.protein}g | פחמימות: {item.carbs}g | שומן: {item.fat}g</p>
                                            <span className="text-[8px] text-gray-600 font-mono">{item.time}</span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <span className="text-xs font-bold text-gray-300 font-mono">{item.calories} קק"ל</span>
                                            <button className="text-red-400 text-xs font-bold px-2 py-1 bg-red-500/10 rounded-lg hover:bg-red-500/20" onClick={() => setFoodDiary(foodDiary.filter(f => f.id !== item.id))}>מחק</button>
                                        </div>
                                    </div>
                                ))}
                                {foodDiary.length === 0 && <p className="text-center text-xs text-gray-500 py-4">היומן ריק. צלם ארוחה כדי להוסיף!</p>}
                            </div>
                            <div className="pt-3 border-t border-slate-800 flex justify-between text-xs font-bold">
                                <span className="text-gray-400">סיכום צריכה נוכחי:</span>
                                <span className="text-lime-400">{totals.calories} קק"ל</span>
                            </div>
                        </div>
                    )}

                    {/* מסך 3: סטטיסטיקות */}
                    {activeTab === 'stats' && (
                        <div className="bg-card rounded-2xl p-4 space-y-4">
                            <h2 className="text-sm font-bold border-b border-slate-800 pb-2 text-purple-400">📈 גרפי מגמה וסטטיסטיקה שבועית</h2>
                            <div className="space-y-4">
                                <div className="bg-slate-950/60 p-4 rounded-xl border border-slate-900 text-center">
                                    <p className="text-xs font-bold">אחוז עמידה ביעדים השבוע</p>
                                    <p className="text-2xl font-black text-lime-400 font-mono mt-1">{Math.round(calPercent)}%</p>
                                    <div className="w-full bg-slate-900 h-2 rounded-full mt-2 overflow-hidden">
                                        <div className="bg-lime-500 h-full" style={{ width: `${calPercent}%` }}></div>
                                    </div>
                                </div>
                                <p className="text-[10px] text-gray-500 text-center">הנתונים והגרפים מתעדכנים על בסיס שבועי קבוע.</p>
                            </div>
                        </div>
                    )}

                    {/* מסך 4: הגדרות לקביעת היעדים של בראל */}
                    {activeTab === 'settings' && (
                        <div className="bg-card rounded-2xl p-4 space-y-4">
                            <h2 className="text-sm font-bold border-b border-slate-800 pb-2 text-cyan-400">⚙️ הגדרות מערכת וקביעת יעדים יומיים</h2>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400">יעד קלוריות (קק"ל)</label>
                                    <input type="number" value={targets.calories} onChange={e => setTargets({...targets, calories: parseInt(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-center text-xs font-bold text-lime-400 focus:outline-none"/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400">יעד חלבון (גרם)</label>
                                    <input type="number" value={targets.protein} onChange={e => setTargets({...targets, protein: parseInt(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-center text-xs font-bold text-lime-400 focus:outline-none"/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400">יעד פחמימות (גרם)</label>
                                    <input type="number" value={targets.carbs} onChange={e => setTargets({...targets, carbs: parseInt(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-center text-xs font-bold text-cyan-400 focus:outline-none"/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400">יעד שומן (גרם)</label>
                                    <input type="number" value={targets.fat} onChange={e => setTargets({...targets, fat: parseInt(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-center text-xs font-bold text-orange-400 focus:outline-none"/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400">יעד מים (ליטר)</label>
                                    <input type="number" step="0.1" value={targets.water} onChange={e => setTargets({...targets, water: parseFloat(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-center text-xs font-bold text-cyan-400 focus:outline-none"/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400">יעד צעדים יומי</label>
                                    <input type="number" value={targets.steps} onChange={e => setTargets({...targets, steps: parseInt(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-center text-xs font-bold text-lime-400 focus:outline-none"/>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* חלונות הזנה (Modals) מתפקדים לעדכון התקדמות אמיתית */}
                    {modalType && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-end justify-center z-50 p-4" onClick={() => setModalType(null)}>
                            <div className="bg-[#0b1324] border border-[#16243d] rounded-t-3xl p-6 w-full max-w-md space-y-4" onClick={e => e.stopPropagation()}>
                                
                                {modalType === 'addWater' && (
                                    <>
                                        <h3 className="text-sm font-bold border-b border-slate-800 pb-2 text-cyan-400">💧 כמה מים שתית עכשיו?</h3>
                                        <div className="grid grid-cols-3 gap-2">
                                            <button onClick={() => { setProgress({...progress, water: progress.water + 0.25}); setModalType(null); }} className="bg-slate-950 p-3 rounded-xl border border-slate-800 text-xs font-bold text-cyan-400">+ 250 מ"ל</button>
                                            <button onClick={() => { setProgress({...progress, water: progress.water + 0.5}); setModalType(null); }} className="bg-slate-950 p-3 rounded-xl border border-slate-800 text-xs font-bold text-cyan-400">+ 500 מ"ל</button>
                                            <button onClick={() => { setProgress({...progress, water: progress.water + 1.0}); setModalType(null); }} className="bg-slate-950 p-3 rounded-xl border border-slate-800 text-xs font-bold text-cyan-400">+ 1 ליטר</button>
                                        </div>
                                    </>
                                )}

                                {modalType === 'addSteps' && (
                                    <>
                                        <h3 className="text-sm font-bold border-b border-slate-800 pb-2 text-lime-400">👟 הזן צעדים שביצעת עכשיו כדי להוסיף להתקדמות</h3>
                                        <input type="number" placeholder="לדוגמה: 1500" value={inputValue} onChange={e => setInputValue(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-center text-lg font-bold text-lime-400 focus:outline-none"/>
                                        <button onClick={() => { if(parseInt(inputValue)){ setProgress({...progress, steps: progress.steps + parseInt(inputValue)}); } setInputValue(""); setModalType(null); }} className="w-full bg-lime-500 py-3 rounded-xl text-black font-bold text-xs">עדכן התקדמות צעדים</button>
                                    </>
                                )}

                                {modalType === 'addWeight' && (
                                    <>
                                        <h3 className="text-sm font-bold border-b border-slate-800 pb-2 text-purple-400">⚖️ עדכון שקילת גוף נוכחית</h3>
                                        <input type="number" step="0.1" placeholder="הזן משקל עדכני בק"ג" value={inputValue} onChange={e => setInputValue(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-center text-lg font-bold text-purple-400 focus:outline-none"/>
                                        <button onClick={() => { if(parseFloat(inputValue)){ const timeStr = new Date().toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'}); setProgress({...progress, weight: parseFloat(inputValue), lastWeightTime: `היום, ${timeStr}`}); } setInputValue(""); setModalType(null); }} className="w-full bg-purple-500 py-3 rounded-xl text-white font-bold text-xs">שמור שקילה מעודכנת</button>
                                    </>
                                )}

                                {modalType === 'cameraScan' && (
                                    <div className="space-y-4 text-center">
                                        <h3 className="text-sm font-bold border-b border-slate-800 pb-2 text-lime-400">📸 סורק ארוחות חכם בטכנולוגיית AI Vision</h3>
                                        {scanStatus === 'idle' && (
                                            <div className="py-6 space-y-3">
                                                <div className="w-16 h-16 bg-lime-500/10 border-2 border-dashed border-lime-500/40 rounded-full flex items-center justify-center mx-auto text-xl">📷</div>
                                                <p className="text-xs text-gray-400">צלם את הארוחה הנוכחית שלך לניתוח וחישוב מאקרו אוטומטי</p>
                                                <button onClick={handleCameraCapture} className="bg-lime-500 text-black font-bold text-xs px-5 py-2.5 rounded-xl">הפעל מצלמה וסרוק מנה</button>
                                            </div>
                                        )}
                                        {scanStatus === 'loading' && (
                                            <div className="py-8 space-y-2">
                                                <div className="w-8 h-8 border-4 border-lime-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                                                <p className="text-xs text-lime-400">ה-AI מנתח את הרכיבים והמשקל הוויזואלי של המנה...</p>
                                            </div>
                                        )}
                                        {scanStatus === 'done' && detectedFood && (
                                            <div className="bg-slate-950 p-4 rounded-xl text-right space-y-2 border border-slate-900">
                                                <p className="text-xs font-bold text-lime-400">🔍 המנה זוהתה בהצלחה ע"י המערכת:</p>
                                                <p className="text-sm font-bold text-white">{detectedFood.name}</p>
                                                <div className="grid grid-cols-4 gap-1 text-center text-[10px] bg-slate-900 p-2 rounded-lg mt-2">
                                                    <div><p className="text-gray-400">קלוריות</p><p className="font-bold font-mono">{detectedFood.calories}</p></div>
                                                    <div><p className="text-gray-400">חלבון</p><p className="font-bold font-mono text-lime-400">{detectedFood.protein}g</p></div>
                                                    <div><p className="text-gray-400">פחמימות</p><p className="font-bold font-mono text-cyan-400">{detectedFood.carbs}g</p></div>
                                                    <div><p className="text-gray-400">שומן</p><p className="font-bold font-mono text-orange-400">{detectedFood.fat}g</p></div>
                                                </div>
                                                <div className="flex gap-2 pt-2">
                                                    <button onClick={addScannedToDiary} className="flex-1 bg-lime-500 text-black font-bold text-xs py-2 rounded-lg">אשר והוסף ליומן האוכל</button>
                                                    <button onClick={() => setScanStatus('idle')} className="bg-slate-800 text-gray-300 text-xs px-3 py-2 rounded-lg">נסה שוב</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                            </div>
                        </div>
                    )}

                    {/* בר ניווט תחתון קבוע ואינטראקטיבי - תואם במדויק ל-image_3.png */}
                    <div className="fixed bottom-0 left-0 right-0 bg-[#070b14]/95 backdrop-blur-md border-t border-[#16243d] py-2 px-6 z-40">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div className={`flex flex-col items-center cursor-pointer ${activeTab === 'settings' ? 'text-lime-400' : 'text-gray-500'}`} onClick={() => setActiveTab('settings')}>
                                <span className="text-lg">⚙️</span><span className="text-[8px] font-bold mt-0.5">הגדרות</span>
                            </div>
                            <div className={`flex flex-col items-center cursor-pointer ${activeTab === 'stats' ? 'text-lime-400' : 'text-gray-500'}`} onClick={() => setActiveTab('stats')}>
                                <span className="text-lg">📈</span><span className="text-[8px] font-bold mt-0.5">סטטיסטיקות</span>
                            </div>
                            <div className="w-12 h-12 bg-gradient-to-tr from-lime-500 to-emerald-400 rounded-full flex items-center justify-center text-black font-black text-xl shadow-lg shadow-lime-500/30 -mt-5 cursor-pointer transform active:scale-90 transition-transform" onClick={() => setModalType('cameraScan')}>+</div>
                            <div className={`flex flex-col items-center cursor-pointer ${activeTab === 'diary' ? 'text-lime-400' : 'text-gray-500'}`} onClick={() => setActiveTab('diary')}>
                                <span className="text-lg">4️⃣9️⃣</span><span className="text-[8px] font-bold mt-0.5">יומן אוכל</span>
                            </div>
                            <div className={`flex flex-col items-center cursor-pointer ${activeTab === 'dashboard' ? 'text-lime-400' : 'text-gray-500'}`} onClick={() => setActiveTab('dashboard')}>
                                <span className="text-lg">📊</span><span className="text-[8px] font-bold mt-0.5">דאשבורד</span>
                            </div>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
