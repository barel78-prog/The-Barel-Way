<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדרך של בראל לחיטוב</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f19] text-white font-sans antialiased pb-24">

    <!-- HEADER -->
    <header class="p-6 flex justify-between items-center max-w-md mx-auto">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-xl">💪</div>
            <div class="text-right">
                <h1 class="text-lg font-bold bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">בוקר טוב, בראל</h1>
                <p class="text-xs text-gray-500 mt-0.5">📅 26 ביוני 2026</p>
            </div>
        </div>
        <button class="p-2 rounded-xl bg-slate-950/40 border border-slate-800/80 text-gray-400 relative">🔔</button>
    </header>

    <main class="max-w-md mx-auto px-4 space-y-4">
        
        <!-- MAIN CARD: CALORIES & PROTEIN -->
        <div class="bg-slate-900/40 backdrop-blur-xl border border-slate-800/60 rounded-3xl p-6 shadow-2xl">
            <div class="grid grid-cols-12 gap-4 items-center">
                <div class="col-span-5 flex flex-col items-center justify-center relative">
                    <div class="w-28 h-28 rounded-full border-4 border-slate-800 flex flex-col items-center justify-center relative shadow-[inset_0_0_20px_rgba(0,0,0,0.6)]">
                        <div class="absolute inset-0 rounded-full border-4 border-t-lime-500 border-r-lime-400 border-b-transparent border-l-transparent drop-shadow-[0_0_8px_rgba(132,204,22,0.6)]"></div>
                        <span class="text-xs text-gray-400 font-medium">קלוריות</span>
                        <span class="text-2xl font-black text-white tracking-tight mt-0.5">1,450</span>
                        <span class="text-[10px] text-gray-500 font-bold mt-0.5">/ 2400</span>
                    </div>
                </div>

                <div class="col-span-7 space-y-4 text-right">
                    <div>
                        <div class="flex justify-between items-end mb-1 flex-row-reverse">
                            <span class="text-sm font-bold text-lime-400 flex items-center gap-1.5">חלבון (הדגש שלך)</span>
                            <span class="text-xs text-gray-400"><strong class="text-white text-sm">160g</strong> / 210g</span>
                        </div>
                        <div class="w-full bg-slate-950/60 h-2.5 rounded-full overflow-hidden border border-slate-800/40">
                            <div class="bg-gradient-to-r from-lime-500 to-lime-400 h-full rounded-full shadow-[0_0_10px_rgba(132,204,22,0.4)]" style="width: 76%"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2 text-xs pt-1 border-t border-slate-800/40 text-center">
                        <div>
                            <span class="text-gray-500 block">פחמימות</span>
                            <span class="font-bold text-cyan-400">270g / 300g</span>
                        </div>
                        <div>
                            <span class="text-gray-500 block">שומן</span>
                            <span class="font-bold text-orange-400">70g / 85g</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-4 pt-3 border-t border-slate-800/40 text-center text-xs text-gray-400 font-medium">
                נותרו לך עוד <span className="text-lime-400 font-bold">950 קק"ל</span> להשגת היעד היומי
            </div>
        </div>

        <!-- AI PHOTO SCANNER -->
        <div class="bg-gradient-to-br from-slate-900/80 to-slate-950/40 backdrop-blur-xl border border-lime-500/30 rounded-2xl p-4 shadow-[0_0_25px_rgba(132,204,22,0.05)]">
            <button onclick="alert('מתחבר למצלמה לניתוח ה-AI...')" class="w-full flex items-center justify-between flex-row-reverse">
                <div class="flex items-center text-right flex-row-reverse">
                    <div class="w-12 h-12 rounded-xl bg-lime-500/10 border border-lime-500/30 flex items-center justify-center text-xl ml-3">📷</div>
                    <div>
                        <h3 class="text-sm font-bold text-white">סורק ארוחה בטכנולוגיית AI</h3>
                        <p class="text-xs text-gray-400 mt-0.5">צלם את הצלחת לניתוח קלוריות וחלבון מיידי</p>
                    </div>
                </div>
                <div class="w-8 h-8 rounded-full bg-slate-900 border border-slate-800 flex items-center justify-center text-gray-400">＋</div>
            </button>
        </div>

        <!-- TRIPLE METRICS ROW -->
        <div class="grid grid-cols-3 gap-3">
            <div class="bg-slate-900/40 backdrop-blur-xl border border-slate-800/60 rounded-2xl p-3 text-center flex flex-col justify-between h-36">
                <div class="text-xl">💧</div>
                <div>
                    <span class="text-xs text-gray-400 block font-medium">מים</span>
                    <span class="text-lg font-black text-white mt-0.5">1.8</span>
                    <span class="text-[10px] text-gray-500 block">/ 3.0L</span>
                </div>
                <button onclick="alert('נוספו 250 מ''ל!')" class="mt-2 w-full py-1 bg-cyan-950/40 border border-cyan-800/40 rounded-lg text-[10px] font-bold text-cyan-400">+ 250ml</button>
            </div>

            <div class="bg-slate-900/40 backdrop-blur-xl border border-slate-800/60 rounded-2xl p-3 text-center flex flex-col justify-between h-36">
                <div class="text-xl">👣</div>
                <div>
                    <span class="text-xs text-gray-400 block font-medium">צעדים</span>
                    <span class="text-lg font-black text-emerald-400 mt-0.5">7,200</span>
                    <span class="text-[10px] text-gray-500 block">/ 10k</span>
                </div>
                <div class="w-full bg-slate-950/60 h-1 rounded-full overflow-hidden mt-2">
                    <div class="bg-emerald-400 h-full" style="width: 72%"></div>
                </div>
            </div>

            <div class="bg-slate-900/40 backdrop-blur-xl border border-slate-800/60 rounded-2xl p-3 text-center flex flex-col justify-between h-36">
                <div class="text-xl">⚖️</div>
                <div>
                    <span class="text-xs text-gray-400 block font-medium">משקל</span>
                    <span class="text-lg font-black text-white mt-0.5">105.5</span>
                    <span class="text-[10px] text-purple-400 font-bold block mt-0.5">ק"ג נוכחי</span>
                </div>
                <span class="text-[9px] text-gray-500 block">נשקל לאחרונה</span>
            </div>
        </div>
    </main>

    <!-- BOTTOM NAV BAR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-2xl border-t border-slate-900 p-2 flex justify-around items-center max-w-md mx-auto">
        <button class="flex flex-col items-center p-2 text-lime-400">
            <span class="text-xs font-bold">📊 דאשבורד</span>
        </button>
        <button class="flex flex-col items-center p-2 text-gray-500">
            <span class="text-xs">🍽️ יומן אוכל</span>
        </button>
        <button class="flex flex-col items-center p-2 text-gray-500">
            <span class="text-xs">👤 הגדרות</span>
        </button>
    </nav>
</body>
</html>
