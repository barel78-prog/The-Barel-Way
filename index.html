<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הדרך של בראל - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>body { background-color: #03060f; color: white; }</style>
</head>
<body class="pb-20">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // הנתונים המנוהלים של האפליקציה
            const [stats, setStats] = React.useState({
                calories: 1650, water: 1250, weight: 82.5, steps: 5200, food: ""
            });

            const updateStat = (key, value) => setStats(prev => ({...prev, [key]: value}));

            return (
                <div className="max-w-md mx-auto p-4 space-y-6">
                    <h1 className="text-xl font-bold">הדרך של בראל 👋</h1>

                    {/* פאנל קלוריות ומזון */}
                    <div className="p-4 rounded-xl border border-slate-800 bg-slate-900/50">
                        <div className="flex justify-between items-center mb-4">
                            <span className="text-sm">קלוריות: {stats.calories} / 2400</span>
                            <button onClick={() => updateStat('calories', stats.calories + 100)} className="bg-lime-600 px-3 py-1 rounded text-xs">+100</button>
                        </div>
                        <input type="text" placeholder="הזן מזון (למשל: חזה עוף)" className="w-full bg-slate-800 p-2 rounded text-sm" />
                    </div>

                    {/* פאנל מים */}
                    <div className="p-4 rounded-xl border border-slate-800 bg-slate-900/50">
                        <p className="text-sm mb-2">מים: {stats.water}ml / 3000ml</p>
                        <div className="flex gap-2">
                            <button onClick={() => updateStat('water', stats.water + 250)} className="flex-1 bg-cyan-700 py-2 rounded text-xs">+250ml</button>
                            <button onClick={() => updateStat('water', stats.water + 500)} className="flex-1 bg-cyan-700 py-2 rounded text-xs">+500ml</button>
                        </div>
                    </div>

                    {/* פאנל צעדים ומשקל */}
                    <div className="grid grid-cols-2 gap-4">
                        <div className="p-4 rounded-xl border border-slate-800 bg-slate-900/50">
                            <p className="text-xs text-gray-400">צעדים</p>
                            <p className="text-lg font-bold">{stats.steps}</p>
                        </div>
                        <div className="p-4 rounded-xl border border-slate-800 bg-slate-900/50">
                            <p className="text-xs text-gray-400">משקל (kg)</p>
                            <p className="text-lg font-bold">{stats.weight}</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById8('root'));
        root.render(<App />);
    </script>
</body>
</html>
