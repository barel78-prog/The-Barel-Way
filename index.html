<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הדרך של בראל</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        body { background-color: #03060f; }
        .panel { border: 1px solid #162235; background: linear-gradient(145deg, #0b121f, #070b14); }
    </style>
</head>
<body class="text-white antialiased select-none pb-10">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // הסטייט שלנו - כאן מנוהלים כל המדדים
            const [data, setData] = React.useState({ calories: 1650, water: 1250 });

            return (
                <div className="max-w-md mx-auto p-4 space-y-4">
                    {/* Header */}
                    <div className="flex justify-between items-center py-2">
                        <div className="text-gray-400 text-2xl">☰</div>
                        <div className="text-center">
                            <h1 className="text-base font-bold">בוקר טוב, בראל 👋</h1>
                            <p className="text-[10px] text-gray-500 font-mono">26 ביוני 2026</p>
                        </div>
                        <div className="w-8 h-8 rounded-full bg-slate-800 border border-slate-700">👤</div>
                    </div>

                    {/* Macro Panel - העיצוב המקורי */}
                    <div className="panel rounded-2xl p-5">
                        <div className="flex justify-between items-center">
                            <div className="space-y-2">
                                <h2 className="text-[11px] font-bold text-gray-400 uppercase border-b border-slate-800 pb-1">מאקרו-נוטריאנטים</h2>
                                <div className="text-[11px]">🧪 חלבון: 160/210g</div>
                                <div className="text-[11px]">🌾 פחמימות: 270/300g</div>
                                <div className="text-[11px]">🔥 שומן: 70/85g</div>
                            </div>
                            <div className="w-24 h-24 rounded-full border-4 border-[#0e1624] border-t-lime-500 flex flex-col items-center justify-center cursor-pointer active:scale-95" 
                                 onClick={() => setData({...data, calories: data.calories + 100})}>
                                <span className="text-[9px] text-gray-500">קלוריות</span>
                                <span className="text-lg font-black">{data.calories}</span>
                            </div>
                        </div>
                    </div>

                    {/* Water Panel */}
                    <div className="panel rounded-2xl p-5">
                        <h2 className="text-[11px] font-bold text-gray-400 mb-3">צריכת מים: {data.water}ml</h2>
                        <div className="flex gap-2">
                            <button className="flex-1 bg-cyan-900/50 py-2 rounded-lg text-xs font-bold border border-cyan-800" onClick={() => setData({...data, water: data.water + 250})}>+250ml</button>
                            <button className="flex-1 bg-cyan-900/50 py-2 rounded-lg text-xs font-bold border border-cyan-800" onClick={() => setData({...data, water: data.water + 500})}>+500ml</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
