<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הדרך של בראל</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>body { background-color: #03060f; }</style>
</head>
<body class="text-white antialiased select-none pb-28">
    <div id="root"></div>
    <script type="text/babel">

        function MacroPanel({ calories, targetCalories, protein, targetProtein, carbs, targetCarbs, fat, targetFat, onTestClick }) {
            return (
                <div className="relative overflow-hidden rounded-2xl border border-[#162235] bg-gradient-to-b from-[#0b121f] to-[#070b14] p-5 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
                    <div className="grid grid-cols-12 gap-4 items-center">
                        <div className="col-span-6 flex flex-col items-center">
                            <div onTouchStart={onTestClick} onClick={onTestClick} className="w-32 h-32 rounded-full border-[5px] border-[#0e1624] flex flex-col items-center justify-center cursor-pointer">
                                <span className="text-2xl font-black">{calories}</span>
                            </div>
                        </div>
                        <div className="col-span-6 space-y-2">
                             <div className="text-[10px]">🧪 חלבון: {protein}/{targetProtein}g</div>
                             <div className="text-[10px]">🌾 פחמימות: {carbs}/{targetCarbs}g</div>
                             <div className="text-[10px]">🔥 שומן: {fat}/{targetFat}g</div>
                        </div>
                    </div>
                </div>
            );
        }

        function WaterBottle() {
            const [water, setWater] = React.useState(1250);
            return (
                <div className="mt-6 rounded-2xl border border-[#162235] bg-gradient-to-b from-[#0b121f] to-[#070b14] p-5">
                    <h2 className="text-[11px] font-bold text-gray-400 uppercase">מים: {water}ml</h2>
                    <div className="flex gap-4 mt-4">
                        <button onClick={() => setWater(w => w + 250)} className="bg-cyan-900 px-4 py-2 rounded-lg text-xs">+250ml</button>
                        <button onClick={() => setWater(w => w + 500)} className="bg-cyan-900 px-4 py-2 rounded-lg text-xs">+500ml</button>
                    </div>
                </div>
            );
        }

        function App() {
            return (
                <div className="max-w-md mx-auto p-4">
                    <h1 className="text-xl font-bold mb-4">בוקר טוב בראל 👋</h1>
                    <MacroPanel calories={1650} targetCalories={2400} protein={160} targetProtein={210} carbs={270} targetCarbs={300} fat={70} targetFat={85} />
                    <WaterBottle />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
