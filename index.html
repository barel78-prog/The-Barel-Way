<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדרך של בראל</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Rubik', sans-serif; background-color: #03060f; color: white; }
        .bg-card { background: linear-gradient(180deg, #0b1324 0%, #060a14 100%); border: 1px solid #16243d; }
    </style>
</head>
<body class="antialiased pb-28">

<div id="root"></div>

<script type="text/babel" data-presets="react">
    const { useState, useMemo } = React;

    function App() {
        const [activeTab, setActiveTab] = useState('dashboard');
        const [targets, setTargets] = useState({ calories: 2400, protein: 210, carbs: 300, fat: 85, water: 2.5, steps: 10000 });
        const [foodDiary, setFoodDiary] = useState([
            { id: 1, name: 'חזה עוף מבושל ואורז לבן', calories: 900, protein: 90, carbs: 100, fat: 15, time: '13:15' },
            { id: 2, name: 'שייק חלבון ויוגורט פרו', calories: 400, protein: 50, carbs: 20, fat: 5, time: '16:45' }
        ]);
        const [progress, setProgress] = useState({ water: 1.8, steps: 7200, weight: 105, lastWeightTime: "היום, 19:03" });
        const [modalType, setModalType] = useState(null);
        const [scanStatus, setScanStatus] = useState('idle');
        const [detectedFood, setDetectedFood] = useState(null);

        const totals = useMemo(() => {
            return foodDiary.reduce((acc, item) => {
                acc.calories += item.calories || 0;
                acc.protein += item.protein || 0;
                acc.carbs += item.carbs || 0;
                acc.fat += item.fat || 0;
                return acc;
            }, { calories: 0, protein: 0, carbs: 0, fat: 0 });
        }, [foodDiary]);

        const calPercent = targets.calories ? Math.min((totals.calories / targets.calories) * 100, 100) : 0;

        const getDynamicGreeting = () => {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 12) return "בוקר טוב";
            if (hour >= 12 && hour < 17) return "צהריים טובים";
            if (hour >= 17 && hour < 22) return "ערב טוב";
            return "לילה טוב";
        };

        // ... (שאר הפונקציות כמו handleCameraCapture וכו' - נוסיף בהמשך)

        return React.createElement('div', { className: "max-w-md mx-auto px-4 pt-4 space-y-4" },
            // כאן יהיה כל ה-UI
            React.createElement('h1', { className: "text-2xl font-bold text-center" }, getDynamicGreeting() + ", בראל 👋"),
            React.createElement('p', { className: "text-center text-lime-400" }, "האפליקציה עובדת! 🎉")
        );
    }

    window.onload = () => {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    };
</script>
</body>
</html>
