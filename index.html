<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדרך של בראל לחיטוב</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        .bottle-shape {
            position: relative;
            width: 70px;
            height: 140px;
            border: 3px solid rgba(34, 211, 238, 0.6);
            border-radius: 12px 12px 20px 20px;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
        }
        .bottle-shape::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 26px;
            height: 12px;
            background: rgba(34, 211, 238, 0.8);
            border-radius: 4px 4px 0 0;
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-white font-sans antialiased pb-24 selection:bg-lime-500 selection:text-black">

    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [activeTab, setActiveTab] = React.useState('dashboard');
            
            // יעדים
            const [targetCalories, setTargetCalories] = React.useState(1650);
            const [targetProtein, setTargetProtein] = React.useState(210);
            const [targetWater, setTargetWater] = React.useState(2.5);
            
            // מדדים בזמן אמת
            const [calories, setCalories] = React.useState(1450);
            const [protein, setProtein] = React.useState(160);
            const [waterMl, setWaterMl] = React.useState(1500);
            const [weight, setWeight] = React.useState(105.5);
            
            // קלט מים חופשי
            const [customWater, setCustomWater] = React.useState('');
            const [isEditingWeight, setIsEditingWeight] = React.useState(false);
            const [weightInput, setWeightInput] = React.useState(105.5);

            // הוספת מים ללא הגבלה עליונה
            const addWater = (amount) => {
                if (!amount || isNaN(amount)) return;
                setWaterMl(prev => prev + Number(amount));
            };

            // הפעלת מצלמה אמיתית בנייד
            const triggerCamera = (e) => {
                const file = e.target.files[0];
                if (file) {
                    alert(`התמונה התקבלה בהצלחה! בשלב הבא ה-AI ינתח את הקלוריות והחלבון של המנה.`);
                }
            };

            const caloriePercentage = Math.min((calories / targetCalories) * 100, 100);
            const proteinPercentage = Math.min((protein / targetProtein) * 100, 100);
            const waterPercentage = Math.min((waterMl / (targetWater * 1000)) * 100, 100);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col justify-between">
                    
                    {activeTab === 'dashboard' && (
                        <div>
                            {/* HEADER */}
                            <header className="p-6 flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-xl">💪</div>
                                    <div className="text-right">
                                        <h1 className="text-lg font-bold bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">בוקר טוב, בראל</h1>
                                        <p className="text-xs text-gray-500 mt-0.5">📅 26 ביוני 2026</p>
                                    </div>
                                </div>
                            </header>

                            <main className="px-4 space-y-4">
                                
                                {/* 🎯 טבעות תאומות קלוריות וחלבון */}
                                <div className="bg-slate-900/40 backdrop-blur-xl border border-slate-800/60 rounded-3xl p-6 shadow-2xl">
                                    <div className="flex justify-around items-center">
                                        {/* קלוריות */}
                                        <div className="flex flex-col items-center justify-center">
                                            <div className="w-28 h-28 rounded-full border-4 border-slate-800 flex flex-col items-center justify-center relative shadow-[inset_0_0_20px_rgba(0,0,0,0.6)]">
                                                <div className="absolute inset-0 rounded-full border-4 border-t-lime-500 border-r-lime-400 border-b-transparent border-l-transparent drop-shadow-[0_0_8px_rgba(132,204,22,0.6)]" style={{ transform: `rotate(${caloriePercentage * 3.6}deg)` }}></div>
                                                <span className="text-xs text-gray-400 font-medium">קלוריות</span>
                                                <span className="text-xl font-black text-white">{calories}</span>
                                                <span className="text-[10px] text-gray-500 font-bold">/ {targetCalories}</span>
                                            </div>
                                        </div>

                                        {/* חלבון - זהה לחלוטין במבנה */}
                                        <div className="flex flex-col items-center justify-center">
                                            <div className="w-28 h-28 rounded-full border-4 border-slate-800 flex flex-col items-center justify-center relative shadow-[inset_0_0_20px_rgba(0,0,0,0.6)]">
                                                <div className="absolute inset-0 rounded-full border-4 border-t-cyan-500 border-r-cyan-400 border-b-transparent border-l-transparent drop-shadow-[0_0_8px_rgba(34,211,238,0.6)]" style={{ transform: `rotate(${proteinPercentage * 3.6}deg)` }}></div>
                                                <span className="text-xs text-gray-400 font-medium">חלבון</span>
                                                <span className="text-xl font-black text-white">{protein}g</span>
                                                <span className="text-[10px] text-gray-500 font-bold">/ {targetProtein}g</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 📷 כרטיס מצלמה הפותח את מצלמת האייפון באמת */}
                                <label className="block bg-gradient-to-br from-slate-900/80 to-slate-950/40 backdrop-blur-xl border border-lime-500/30 rounded-2xl p-4 shadow-[0_0_25px_rgba(132,204,22,0.05)] cursor-pointer active:scale-98 transition-transform">
                                    <input type="file" accept="image/*" capture="environment" onChange={triggerCamera} className="hidden" />
                                    <div className="w-full flex items-center justify-between flex-row-reverse">
                                        <div className="flex items-center text-right flex-row-reverse">
                                            <div className="w-12 h-12 rounded-xl bg-lime-500/10 border border-lime-500/30 flex items-center justify-center text-xl ml-3">📷</div>
                                            <div>
                                                <h3 className="text-sm font-bold text-white">סורק ארוחה בטכנולוגיית AI</h3>
                                                <p className="text-xs text-gray-400 mt-0.5">לחץ כאן כדי לפתוח את מצלמת המכשיר ולסרוק</p>
                                            </div>
                                        </div>
                                        <div className="w-8 h-8 rounded-full bg-slate-900 border border-slate-800 flex items-center justify-center text-gray-400">＋</div>
                                    </div>
                                </label>

                                {/* 📦 שורת מים (בקבוק) ומשקל (צג דיגיטלי) */}
                                <div className="grid grid-cols-2 gap-4">
                                    
                                    {/* 🍼 מים - בקבוק שתייה אמיתי ונוזל דינמי */}
                                    <div className="bg-slate-900/40 backdrop-blur-xl border border-slate-800/60 rounded-2xl p-4 flex flex-col items-center justify-between h-64">
                                        <span className="text-xs text-gray-400 font-bold">מעקב נוזלים</span>
                                        
                                        <div className="bottle-shape">
                                            <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-cyan-600 to-cyan-400 opacity-80 transition-all duration-500 rounded-b-xl" style={{ height: `${waterPercentage}%` }}>
                                                <div className="absolute top-0 left-0 right-0 h-1 bg-white/30 animate-pulse"></div>
                                            </div>
                                        </div>

                                        <div className="text-center">
                                            <span className="font-mono text-sm text-white font-bold">{(waterMl/1000).toFixed(2)}L</span>
                                            <span className="text-gray-500 block text-[10px]">יעד: {targetWater}L</span>
                                        </div>

                                        <div className="space-y-1.5 w-full">
                                            <div className="flex gap-1">
                                                <button onClick={() => addWater(250)} className="flex-1 py-1 bg-cyan-950/60 border border-cyan-800/40 rounded-lg text-[9px] font-bold text-cyan-400">+250</button>
                                                <button onClick={() => addWater(500)} className="flex-1 py-1 bg-cyan-950/60 border border-cyan-800/40 rounded-lg text-[9px] font-bold text-cyan-400">+500</button>
                                            </div>
                                            <div className="flex gap-1">
                                                <input type="number" placeholder="ml" value={customWater} onChange={(e) => setCustomWater(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-2 text-[10px] font-mono text-center text-white focus:border-cyan-400 outline-none" />
                                                <button onClick={() => { addWater(customWater); setCustomWater(''); }} className="bg-cyan-500 text-black font-bold text-xs px-2.5 rounded-lg">+</button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 📟 משקל גוף - צג LCD אלקטרוני ועריכה ישירה */}
                                    <div className="bg-slate-900/40 backdrop-blur-xl border border-slate-800/60 rounded-2xl p-4 flex flex-col justify-between h-64 text-center">
                                        <span className="text-xs text-gray-400 font-bold">משקל גוף</span>
                                        
                                        <div className="w-full bg-[#040712] border-2 border-slate-800 rounded-xl p-3 shadow-[inset_0_0_15px_rgba(0,0,0,1)] border-t-purple-500/40">
                                            <div className="text-[9px] font-bold text-purple-500/40 font-mono tracking-widest mb-1">ELECTRONIC LCD</div>
                                            <div className="text-3xl font-bold text-purple-400 font-mono tracking-tight drop-shadow-[0_0_8px_rgba(192,132,252,0.8)]" style={{ fontFamily: "'Orbitron', sans-serif" }}>
                                                {weight.toFixed(1)}
                                            </div>
                                            <div className="text-[9px] text-gray-600 mt-1 font-bold">KG</div>
                                        </div>

                                        {isEditingWeight ? (
                                            <div className="flex gap-1 items-center mt-2">
                                                <input type="number" step="0.1" value={weightInput} onClick={(e) => e.target.select()} onChange={(e) => setWeightInput(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-1 text-xs text-center text-purple-400 font-mono" />
                                                <button onClick={() => { setWeight(weightInput); setIsEditingWeight(false); }} className="bg-purple-500 text-white font-bold text-xs px-2 rounded-lg">V</button>
                                            </div>
                                        ) : (
                                            <button onClick={() => setIsEditingWeight(true)} className="mt-2 text-[10px] font-bold text-purple-400 bg-purple-950/30 hover:bg-purple-950/60 border border-purple-900/40 py-1 rounded-xl transition-colors">
                                                📝 עדכן משקל בוקר
                                            </button>
                                        )}
                                    </div>

                                </div>
                            </main>
                        </div>
                    )}

                    {/* ⚙️ מסך הגדרות עם פונקציית איפוס בלחיצה בודדת */}
                    {activeTab === 'settings' && (
                        <div className="p-6 text-right space-y-6">
                            <div>
                                <h2 className="text-xl font-bold mb-1">⚙️ הגדרת יעדים אישיים</h2>
                                <p className="text-xs text-gray-500">עדכון מהיר ללא צורך במחיקה ארוכה באייפון.</p>
                            </div>

                            <div className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1">יעד קלוריות יומי:</label>
                                    <div className="relative">
                                        <input type="number" value={targetCalories} onChange={(e) => setTargetCalories(Number(e.target.value))} onClick={(e) => e.target.select()} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white font-mono font-bold text-left outline-none pl-10" />
                                        <button onClick={() => setTargetCalories('')} className="absolute left-3 top-1.5 text-gray-500 hover:text-white text-xs p-1">❌</button>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1">יעד חלבון יומי (g):</label>
                                    <div className="relative">
                                        <input type="number" value={targetProtein} onChange={(e) => setTargetProtein(Number(e.target.value))} onClick={(e) => e.target.select()} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white font-mono font-bold text-left outline-none pl-10" />
                                        <button onClick={() => setTargetProtein('')} className="absolute left-3 top-1.5 text-gray-500 hover:text-white text-xs p-1">❌</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* BOTTOM NAV BAR */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-2xl border-t border-slate-900 p-2 flex justify-around items-center max-w-md mx-auto z-50">
                        <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center p-2 ${activeTab === 'dashboard' ? 'text-lime-400 font-bold' : 'text-gray-500'}`}>
                            <span className="text-xs">📊 דאשבורד</span>
                        </button>
                        <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center p-2 ${activeTab === 'settings' ? 'text-lime-400 font-bold' : 'text-gray-500'}`}>
                            <span className="text-xs">⚙️ הגדרות</span>
                        </button>
                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
