<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדרך של בראל - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #03060f; }
        .panel-bg { background: linear-gradient(145deg, #0b111e, #070b14); border: 1px solid #131a2a; }
        .digital-screen { background: linear-gradient(180deg, #151d30, #0a0f1a); border: 1px solid #222d44; box-shadow: inset 0 0 15px rgba(0,0,0,0.6); }
        /* עיצוב הבקבוק הריאליסטי מהתמונה */
        .real-bottle {
            position: relative; width: 64px; height: 130px;
            border: 2px solid rgba(255,255,255,0.15); border-radius: 8px 8px 16px 16px;
            background: linear-gradient(90deg, rgba(20,30,50,0.6), rgba(10,15,25,0.4));
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); overflow: hidden;
        }
        .real-bottle::before {
            content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 22px; height: 10px; border: 2px solid rgba(255,255,255,0.2); border-radius: 3px 3px 0 0; background: #1a263f;
        }
        .real-bottle-cap {
            position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
            width: 26px; height: 5px; background: #334155; border-radius: 2px; z-index: 10;
        }
        .water-wave {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(180deg, #22a1e6, #0c61ad);
            transition: height 0.5s ease-in-out; box-shadow: inset 0 4px 10px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body class="text-white font-sans antialiased pb-28">

    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [activeTab, setActiveTab] = React.useState('dashboard');
            
            // נתונים ויעדים המועתקים אחד לאחד מהעיצוב ששלחת
            const [targetCalories, setTargetCalories] = React.useState(2400);
            const [calories, setCalories] = React.useState(1450);
            
            const [protein, setProtein] = React.useState(160);
            const [targetProtein, setTargetProtein] = React.useState(210);
            
            const [carbs, setCarbs] = React.useState(270);
            const [targetCarbs, setTargetCarbs] = React.useState(300);
            
            const [fat, setFat] = React.useState(70);
            const [targetFat, setTargetFat] = React.useState(85);

            // מים
            const [waterLiters, setWaterLiters] = React.useState(1.8);
            const targetWater = 3.0;
            const [customWater, setCustomWater] = React.useState('');

            // משקל
            const [weight, setWeight] = React.useState(105.5); // משקל נוכחי מעודכן שלך
            const [isEditingWeight, setIsEditingWeight] = React.useState(false);
            const [weightInput, setWeightInput] = React.useState(105.5);

            const addWater = (amountMl) => {
                setWaterLiters(prev => prev + (amountMl / 1000));
            };

            const triggerCamera = () => {
                document.getElementById('hidden-camera').click();
            };

            const waterPercentage = Math.min((waterLiters / targetWater) * 100, 100);
            const calorieRemaining = targetCalories - calories;

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col justify-between relative px-4 pt-4">
                    <input type="file" id="hidden-camera" accept="image/*" capture="environment" className="hidden" onChange={() => alert('התמונה נקלטה ב-AI!')} />
                    
                    {activeTab === 'dashboard' && (
                        <div className="space-y-4">
                            
                            {/* TOP BAR */}
                            <div className="flex justify-between items-center px-2">
                                <button className="text-gray-400 text-xl">☰</button>
                                <div className="text-center">
                                    <h1 className="text-md font-bold flex items-center justify-center gap-1">בוקר טוב, בראל 👋</h1>
                                    <p className="text-[11px] text-gray-500 font-mono">26 ביוני 2026</p>
                                </div>
                                <div className="flex items-center gap-2">
                                    <button className="relative text-gray-400 text-lg">🔔<span className="absolute top-0 right-0 w-1.5 h-1.5 bg-lime-500 rounded-full"></span></button>
                                    <div className="w-7 h-7 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-xs">👤</div>
                                </div>
                            </div>

                            {/* MAIN MACRO PANEL */}
                            <div className="panel-bg rounded-2xl p-4 shadow-xl">
                                <div className="grid grid-cols-12 gap-2 items-center">
                                    {/* טבעת קלוריות גדולה */}
                                    <div className="col-span-6 flex flex-col items-center justify-center relative py-2">
                                        <div className="w-32 h-32 rounded-full border-4 border-slate-900 flex flex-col items-center justify-center relative">
                                            <div className="absolute inset-0 rounded-full border-4 border-t-lime-500 border-r-lime-400 border-b-emerald-500/30 border-l-transparent drop-shadow-[0_0_6px_rgba(132,204,22,0.4)]" style={{ transform: 'rotate(45deg)' }}></div>
                                            <span className="text-[11px] text-gray-400">קלוריות</span>
                                            <span className="text-2xl font-black font-mono text-white">{calories.toLocaleString()}</span>
                                            <span className="text-[10px] text-gray-500 font-bold">/ {targetCalories.toLocaleString()}</span>
                                            <span className="text-[9px] text-gray-400 mt-0.5">קק"ל</span>
                                        </div>
                                    </div>

                                    {/* מדדי המאקרו הימניים */}
                                    <div className="col-span-6 space-y-3 pl-1">
                                        <div className="text-[11px] font-bold text-gray-400 mb-1">מאקרו-נוטריאנטים</div>
                                        
                                        {/* חלבון */}
                                        <div className="space-y-0.5">
                                            <div className="flex justify-between text-[10px] text-gray-400">
                                                <span className="font-bold text-white">חלבון</span>
                                                <span>{protein} / {targetProtein} גרם</span>
                                            </div>
                                            <div className="w-full bg-slate-950 h-1.5 rounded-full overflow-hidden flex items-center">
                                                <div className="bg-lime-500 h-full rounded-full" style={{ width: `${(protein/targetProtein)*100}%` }}></div>
                                            </div>
                                        </div>

                                        {/* פחמימות */}
                                        <div className="space-y-0.5">
                                            <div className="flex justify-between text-[10px] text-gray-400">
                                                <span className="font-bold text-white">פחמימות</span>
                                                <span>{carbs} / {targetCarbs} גרם</span>
                                            </div>
                                            <div className="w-full bg-slate-950 h-1.5 rounded-full overflow-hidden">
                                                <div className="bg-cyan-500 h-full rounded-full" style={{ width: `${(carbs/targetCarbs)*100}%` }}></div>
                                            </div>
                                        </div>

                                        {/* שומן */}
                                        <div className="space-y-0.5">
                                            <div className="flex justify-between text-[10px] text-gray-400">
                                                <span className="font-bold text-white">שומן</span>
                                                <span>{fat} / {targetFat} גרם</span>
                                            </div>
                                            <div className="w-full bg-slate-950 h-1.5 rounded-full overflow-hidden">
                                                <div className="bg-orange-500 h-full rounded-full" style={{ width: `${(fat/targetFat)*100}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-3 pt-2 border-t border-slate-900 flex justify-between items-center text-[11px]">
                                    <span className="text-gray-400">נותרו לך עוד <strong className="text-lime-400">{calorieRemaining} קק"ל</strong> להגעה ליעד</span>
                                    <span className="text-emerald-400 font-mono text-[10px]">↗ 120- קל' מאתמול</span>
                                </div>
                            </div>

                            {/* TRIPLE ROW: WATER, STEPS, WEIGHT */}
                            <div className="grid grid-cols-3 gap-3">
                                
                                {/* מים */}
                                <div className="panel-bg rounded-2xl p-3 flex flex-col items-center justify-between h-56 text-center">
                                    <span className="text-[11px] font-bold text-gray-400 flex items-center gap-1">💧 מים</span>
                                    
                                    <div className="real-bottle my-1">
                                        <div className="real-bottle-cap"></div>
                                        <div className="water-wave" style={{ height: `${waterPercentage}%` }}></div>
                                    </div>

                                    <div className="text-[11px]">
                                        <div className="font-mono text-cyan-400 font-bold">{waterLiters.toFixed(1)} <span className="text-gray-500 text-[9px]">/ {targetWater}</span></div>
                                        <div className="text-[9px] text-gray-500">ליטר ({Math.round(waterPercentage)}%)</div>
                                    </div>

                                    <div className="w-full space-y-1">
                                        <div className="flex gap-1">
                                            <button onClick={() => addWater(250)} className="flex-1 py-0.5 bg-slate-900 border border-slate-800 rounded text-[9px] font-mono text-cyan-400 font-bold">+250</button>
                                            <button onClick={() => addWater(500)} className="flex-1 py-0.5 bg-slate-900 border border-slate-800 rounded text-[9px] font-mono text-cyan-400 font-bold">+500</button>
                                        </div>
                                        <div className="flex gap-1">
                                            <input type="number" placeholder="ml" value={customWater} onChange={(e) => setCustomWater(e.target.value)} className="w-full bg-slate-950 border border-slate-900 text-white rounded px-1 text-[9px] text-center font-mono outline-none" />
                                            <button onClick={() => { addWater(Number(customWater)); setCustomWater(''); }} className="bg-cyan-500 text-black px-1.5 rounded text-[10px] font-bold">+</button>
                                        </div>
                                    </div>
                                </div>

                                {/* צעדים */}
                                <div className="panel-bg rounded-2xl p-3 flex flex-col items-center justify-between h-56 text-center">
                                    <span className="text-[11px] font-bold text-gray-400 flex items-center gap-1">👟 צעדים</span>
                                    
                                    <div className="text-center my-auto">
                                        <div className="text-base font-black text-emerald-400 font-mono">7,200</div>
                                        <div className="text-[9px] text-gray-500 font-mono">/ 10,000</div>
                                        <div className="text-[9px] text-gray-400 mt-1">72% מהיעד</div>
                                    </div>

                                    {/* מיני גרף עמודות דקורטיבי כמו בתמונה */}
                                    <div className="flex items-end justify-center gap-0.5 h-10 w-full px-1">
                                        <div className="w-1 bg-emerald-500/20 h-3 rounded-full"></div>
                                        <div className="w-1 bg-emerald-500/40 h-5 rounded-full"></div>
                                        <div className="w-1 bg-emerald-500/60 h-8 rounded-full"></div>
                                        <div className="w-1 bg-emerald-500 h-10 rounded-full"></div>
                                        <div className="w-1 bg-emerald-500/70 h-6 rounded-full"></div>
                                        <div className="w-1 bg-emerald-500/30 h-4 rounded-full"></div>
                                    </div>
                                </div>

                                {/* משקל */}
                                <div className="panel-bg rounded-2xl p-3 flex flex-col items-center justify-between h-56 text-center cursor-pointer" onClick={() => setIsEditingWeight(true)}>
                                    <span className="text-[11px] font-bold text-gray-400 flex items-center gap-1">⚖️ משקל</span>
                                    
                                    <div className="w-full digital-screen rounded-xl p-2 my-auto">
                                        {isEditingWeight ? (
                                            <div className="flex flex-col items-center gap-1" onClick={(e) => e.stopPropagation()}>
                                                <input type="number" step="0.1" value={weightInput} onClick={(e) => e.target.select()} onChange={(e) => setWeightInput(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 text-center text-xs p-0.5 text-purple-400 rounded outline-none font-mono" />
                                                <button onClick={() => { setWeight(weightInput); setIsEditingWeight(false); }} className="bg-purple-500 text-white font-bold text-[9px] px-2 py-0.5 rounded">שמור</button>
                                            </div>
                                        ) : (
                                            <div>
                                                <div className="text-xs text-purple-400/50 font-mono text-[8px] uppercase">SCALE</div>
                                                <div className="text-xl font-bold text-purple-400 font-mono tracking-tight" style={{ fontFamily: "'Orbitron', sans-serif" }}>{weight.toFixed(1)}</div>
                                                <div className="text-[8px] text-gray-500 font-bold">KG</div>
                                            </div>
                                        )}
                                    </div>

                                    <div className="text-[8px] text-gray-500 leading-tight">
                                        השקילה האחרונה<br/>היום, 07:30
                                    </div>
                                </div>

                            </div>

                            {/* QUICK FOOD TRACKER */}
                            <div className="panel-bg rounded-2xl p-3 flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <button onClick={triggerCamera} className="w-8 h-8 rounded-full bg-lime-500 text-black font-bold flex items-center justify-center text-lg shadow-[0_0_10px_rgba(132,204,22,0.4)]">+</button>
                                    <div className="text-right">
                                        <div className="text-xs font-bold">הוסף אוכל</div>
                                        <div className="text-[10px] text-gray-500">מהיר, קל ופשוט באמצעות ה-AI</div>
                                    </div>
                                </div>
                                <div className="flex gap-1.5">
                                    <div className="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-lg">🥗</div>
                                    <div className="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-lg">🍌</div>
                                    <div className="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-lg">🍗</div>
                                </div>
                            </div>

                            {/* DAILY GOAL PROGRESS BAR */}
                            <div className="panel-bg rounded-2xl p-3 space-y-2">
                                <div className="flex justify-between items-center text-xs">
                                    <span className="font-bold flex items-center gap-1">🎯 יעד יומי</span>
                                    <span className="text-gray-400 text-[11px]">עוד <span className="text-rose-400 font-bold">{calorieRemaining} קק"ל</span> ליעד</span>
                                </div>
                                <div className="w-full bg-slate-950 h-2.5 rounded-full overflow-hidden p-0.5 border border-slate-900">
                                    <div className="bg-gradient-to-r from-rose-500 to-orange-400 h-full rounded-full transition-all duration-500" style={{ width: `${(calories/targetCalories)*100}%` }}></div>
                                </div>
                            </div>

                        </div>
                    )}

                    {/* SETTINGS TAB */}
                    {activeTab === 'settings' && (
                        <div className="p-4 space-y-4 text-right">
                            <h2 className="text-base font-bold border-b border-slate-900 pb-2">⚙️ הגדרת יעדי בסיס</h2>
                            <div className="space-y-3 text-xs">
                                <div>
                                    <label className="block text-gray-400 mb-1">יעד קלוריות:</label>
                                    <input type="number" value={targetCalories} onChange={(e) => setTargetCalories(Number(e.target.value))} onClick={(e) => e.target.select()} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-white font-mono" />
                                </div>
                                <div>
                                    <label className="block text-gray-400 mb-1">יעד חלבון (g):</label>
                                    <input type="number" value={targetProtein} onChange={(e) => setTargetProtein(Number(e.target.value))} onClick={(e) => e.target.select()} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-white font-mono" />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NAVIGATION BAR - מותאם קופי פייסט מהתמונה */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-[#040712]/95 backdrop-blur-md border-t border-slate-900/80 p-2 flex justify-around items-center max-w-md mx-auto z-50">
                        <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center p-1 ${activeTab === 'dashboard' ? 'text-lime-400 font-bold' : 'text-gray-500'}`}>
                            <span className="text-lg">📊</span>
                            <span className="text-[10px] mt-0.5">דאשבורד</span>
                        </button>
                        <button className="flex flex-col items-center p-1 text-gray-500">
                            <span className="text-lg">🥣</span>
                            <span className="text-[10px] mt-0.5">יומן אוכל</span>
                        </button>
                        <div className="relative -top-4">
                            <button onClick={triggerCamera} className="w-12 h-12 rounded-full bg-gradient-to-tr from-lime-500 to-emerald-400 text-black font-black flex items-center justify-center text-2xl shadow-lg shadow-lime-500/20 active:scale-95 transition-transform">＋</button>
                        </div>
                        <button className="flex flex-col items-center p-1 text-gray-500">
                            <span className="text-lg">📈</span>
                            <span className="text-[10px] mt-0.5">סטטיסטיקות</span>
                        </button>
                        <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center p-1 ${activeTab === 'settings' ? 'text-lime-400 font-bold' : 'text-gray-500'}`}>
                            <span className="text-lg">⚙️</span>
                            <span className="text-[10px] mt-0.5">הגדרות</span>
                        </button>
                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
