<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדרך של בראל</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>body { background-color: #03060f; color: white; }</style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [stats, setStats] = React.useState({
                calories: 1650, water: 1250, weight: 82.5, steps: 5200
            });

            return (
                <div className="max-w-md mx-auto p-4 space-y-4">
                    <h1 className="text-xl font-bold mb-4">הדרך של בראל 👋</h1>
                    
                    <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                        <p>קלוריות: {stats.calories}</p>
                        <button onClick={() => setStats({...stats, calories: stats.calories + 100})} className="bg-lime-600 px-2 py-1 rounded text-xs mt-2">+100</button>
                    </div>

                    <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                        <p>מים: {stats.water}ml</p>
                        <button onClick={() => setStats({...stats, water: stats.water + 250})} className="bg-cyan-700 px-2 py-1 rounded text-xs mt-2">+250ml</button>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                            <p className="text-gray-400 text-xs">צעדים</p>
                            <p>{stats.steps}</p>
                        </div>
                        <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                            <p className="text-gray-400 text-xs">משקל</p>
                            <p>{stats.weight}</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
