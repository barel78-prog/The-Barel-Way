<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדרך של בראל לחיטוב</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0b0f19] text-white font-sans antialiased pb-24">

    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [activeTab, setActiveTab] = React.useState('dashboard');
            
            // יעדים הניתנים לשינוי (נשמרים ב-State)
            const [targetCalories, setTargetCalories] = React.useState(1650);
            const [targetProtein, setTargetProtein] = React.useState(210);
            const [targetWater, setTargetWater] = React.useState(2.5); // בליטרים
            
            // מדדים נוכחיים בזמן אמת
            const [calories, setCalories] = React.useState(1450);
            const [protein, setProtein] = React.useState(160);
            const [waterMl, setWaterMl] = React.useState(1500); // מנוהל ב-ml לנוחות
            const [steps, setSteps] = React.useState(7200);
            const [weight, setWeight] = React.useState(105.5);

            // הוספת מים לפי מ"ל
            const addWater = (amount) => {
                const maxWaterMl = targetWater * 1000;
                setWaterMl(prev => Math.min(prev + amount, maxWaterMl));
            };

            const handleAIScan = () => {
                alert("סורק ה-AI מתחבר למצלמה לניתוח המנה המבוקשת!");
            };

            // חישוב אחוזי התקדמות עבור הטבעות
            const caloriePercentage = Math.min((calories / targetCalories) * 100, 100);
            const proteinPercentage = Math.min((protein / targetProtein) * 100, 100);
            const waterPercentage = Math.min((waterMl / (targetWater * 1000)) * 100, 100);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col justify-between">
                    
                    {/* 📊 מסך דאשבורד ראשי */}
                    {activeTab === 'dashboard' && (
                        <div>
                            {/* HEADER */}
                            <header className="p-6 flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-xl">💪</div>
                                    <div className="text-right">
                                        <h1 className="text-lg font-bold bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">בוקר טוב, בראל</h1>
                                        <p className="text-xs text-gray-500 mt-0.5">📅 26 ביוני 2026</p>
                                    </div>
                                </div>
                                <button className="p-2 rounded-xl bg-slate-950/40 border border-slate-800/80 text-gray-400">🔔</button>
                            </header>

                            <main className="px-4 space-y-4">
                                
                                {/* 🎯 כרטיס קלוריות וחלבון בעיצוב טבעות תאומות */}
                                <div className="bg-slate-900/40 backdrop-blur-xl border border-slate-800/60 rounded-3xl p-6 shadow-2xl">
                                    <div className="flex justify-around items-center">
                                        
                                        {/* טבעת קלוריות */}
                                        <div className="flex flex-col items-center justify-center relative">
                                            <div className="w-28 h-28 rounded-full border-4 border-slate-800 flex flex-col items-center justify-center relative shadow-[inset_0_0_20px_rgba(0,0,0,0.6)]">
                                                <div className="absolute inset-0 rounded-full border-4 border-t-lime-500 border-r-lime-400 border-b-transparent border-l-transparent drop-shadow-[0_0_8px_rgba(132,204,22,0.6)]" style={{ transform: `rotate(${caloriePercentage * 3.6}deg)`, transition: 'transform 0.5s' }}></div>
                                                <span className="text-xs text-gray-400 font-medium">קלוריות</span>
                                                <span className="text-xl font-black text-white tracking-tight mt-0.5">{calories.toLocaleString()}</span>
                                                <span className="text-[10px] text-gray-500 font-bold mt-0.5">/ {targetCalories}</span>
                                            </div>
                                        </div>

                                        {/* טבעת חלבון - זהה לחלוטין לקלוריות לבקשתך */}
                                        <div className="flex flex-col items-center justify-center relative">
                                            <div className="w-28 h-28 rounded-full border-4 border-slate-800 flex flex-col items-center justify-center relative shadow-[inset_0_0_20px_rgba(0,0,0,0.6)]">
                                                <div className="absolute inset-0 rounded-full border-4 border-t-cyan-500 border-r-cyan-400 border-b-transparent border-l-transparent drop-shadow-[0_0_8px_rgba(34,211,238,0.6)]" style={{ transform: `rotate(${proteinPercentage * 3.6}deg)`, transition: 'transform 0.5s' }}></div>
                                                <span className="text-xs text-gray-400 font-medium">חלבון</span>
                                                <span className="text-xl font-black text-white tracking-tight mt-0.5">{protein}g</span>
                                                <span className="text-[10px] text-gray-500 font-bold mt-0.5">/ {targetProtein}g</span>
                                            </div>
                                        </div>

                                    </div>
                                    <div className="mt-4 pt-3 border-t border-slate-800/40 text-center text-xs text-gray-400 font-medium">
                                        נותרו לך עוד <span className="text-lime-400 font-bold">{Math.max(0, targetCalories - calories)} קק"ל</span> ליעד היומי
                                    </div>
                                </div>

                                {/* 📷 סורק ארוחה AI */}
                                <div className="bg-gradient-to-br from-slate-900/80 to-slate-950/40 backdrop-blur-xl border border-lime-500/30 rounded-2xl p-4 shadow-[0_0_25px_rgba(132,204,22,0.05)]">
                                    <button onClick={handleAIScan} className="w-full flex items-center justify-between flex-row-reverse">
                                        <div className="flex items-center text-right flex-row-reverse">
                                            <div className="w-12 h-12 rounded-xl bg-lime-500/10 border border-lime-500/30 flex items-center justify-center text-xl ml-3">📷</div>
                                            <div>
                                                <h3 className="text-sm font-bold text-white">סורק ארוחה בטכנולוגיית AI</h3>
                                                <p className="text-xs text-gray-400 mt-0.5">צלם את הצלחת לניתוח קלוריות וחלבון מיידי</p>
                                            </div>
                                        </div>
                                        <div className="w-8 h-8 rounded-full bg-slate-900 border border-slate-800 flex items-center justify-center text-gray-400">＋</div>
                                    </button>
                                </div>

                                {/* 📦 שורת מדדי מים ומשקל משודרגים */}
                                <div className="grid grid-cols-2 gap-4">
                                    
                                    {/* 🍼 כרטיס מים מעוצב כבקבוק 750 מ"ל מתמלא */}
                                    <div className="bg-slate-900/40 backdrop-blur-xl border border-slate-800/60 rounded-2xl p-4 text-center flex flex-col justify-between items-center h-52">
                                        <span className="text-xs text-gray-400 font-bold block">מעקב נוזלים</span>
                                        
                                        {/* בקבוק ויזואלי מתמלא */}
                                        <div className="w-12 h-24 border-2 border-cyan-500/40 rounded-xl relative overflow-hidden bg-slate-950/60 my-2 shadow-[0_0_15px_rgba(34,211,238,0.1)]">
                                            {/* שכבת המים הדינמית */}
                                            <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-cyan-600 to-cyan-400 opacity-80 transition-all duration-500 shadow-[0_0_10px_#22d3ee]" style={{ height: `${waterPercentage}%` }}></div>
                                            {/* סימון של 750ml באמצע כרפרנס */}
                                            <div className="absolute inset-0 flex items-center justify-center text-[9px] font-bold text-white/40 pointer-events-none">750ml</div>
                                        </div>

                                        <div className="text-xs">
                                            <span className="font-mono text-white font-bold">{(waterMl/1000).toFixed(2)}L</span>
                                            <span className="text-gray-500 block text-[10px]">יעד: {targetWater}L</span>
                                        </div>

                                        <div className="flex gap-1 w-full mt-2">
                                            <button onClick={() => addWater(250)} className="flex-1 py-1 bg-cyan-950/60 border border-cyan-800/60 rounded-lg text-[10px] font-bold text-cyan-400 active:scale-95 transition-transform">+250ml</button>
                                            <button onClick={() => addWater(500)} className="flex-1 py-1 bg-cyan-950/60 border border-cyan-800/60 rounded-lg text-[10px] font-bold text-cyan-400 active:scale-95 transition-transform">+500ml</button>
                                        </div>
                                    </div>

                                    {/* 📟 כרטיס משקל מעוצב כצג משקל דיגיטלי זוהר */}
                                    <div className="bg-slate-900/40 backdrop-blur-xl border border-slate-800/60 rounded-2xl p-4 text-center flex flex-col justify-between h-52">
                                        <span className="text-xs text-gray-400 font-bold block">משקל גוף</span>
                                        
                                        {/* צג משקל דיגיטלי ייעודי */}
                                        <div className="w-full bg-[#050810] border-2 border-slate-800 rounded-xl p-3 my-auto shadow-[inset_0_0_15px_rgba(0,0,0,0.9)] flex flex-col items-center justify-center border-t-purple-500/40">
                                            <div className="text-xs font-bold text-purple-500/60 tracking-widest uppercase mb-1 font-mono">DIGITAL SCALE</div>
                                            {/* תצוגת משקל עם פונט דיגיטלי זוהר */}
                                            <div className="text-3xl font-bold text-purple-400 tracking-tight font-mono drop-shadow-[0_0_6px_rgba(192,132,252,0.8)]" style={{ fontFamily: "'Orbitron', sans-serif" }}>
                                                {weight.toFixed(1)}
                                            </div>
                                            <div className="text-[10px] text-gray-500 mt-1 font-bold">KG</div>
                                        </div>

                                        <div className="text-[10px] text-gray-500 font-medium">
                                            נשקל לאחרונה בשירותים 🫣
                                        </div>
                                    </div>

                                </div>
                            </main>
                        </div>
                    )}

                    {/* 🍽️ מסך יומן אוכל */}
                    {activeTab === 'diary' && (
                        <div className="p-6 text-center space-y-4">
                            <h2 className="text-xl font-bold mb-2">🍽️ יומן האוכל של בראל</h2>
                            <div className="bg-slate-900/40 border border-slate-800/60 rounded-2xl p-4 text-gray-400 text-sm text-right">
                                תמונות הארוחות ופירוט הערכים התזונתיים המדויקים שה-AI ינתח עבורך יישמרו ויוצגו כאן ברצף כרונולוגי.
                            </div>
                        </div>
                    )}

                    {/* ⚙️ מסך הגדרת יעדים דינמי לבקשתך */}
                    {activeTab === 'settings' && (
                        <div className="p-6 text-right space-y-6">
                            <div>
                                <h2 className="text-xl font-bold mb-1">⚙️ הגדרת יעדים אישיים</h2>
                                <p className="text-xs text-gray-500">עדכן כאן את היעדים שלך והדאשבורד יתעדכן בהתאם במיידי.</p>
                            </div>

                            <div className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1">יעד קלוריות יומי (קק"ל):</label>
                                    <input type="number" value={targetCalories} onChange={(e) => setTargetCalories(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white font-mono font-bold focus:border-lime-500 outline-none text-left" />
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1">יעד חלבון יומי (גרם):</label>
                                    <input type="number" value={targetProtein} onChange={(e) => setTargetProtein(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white font-mono font-bold focus:border-cyan-500 outline-none text-left" />
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1">יעד מים יומי (ליטרים):</label>
                                    <input type="number" step="0.1" value={targetWater} onChange={(e) => setTargetWater(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white font-mono font-bold focus:border-cyan-500 outline-none text-left" />
                                </div>
                            </div>

                            <div className="bg-lime-500/10 border border-lime-500/20 p-3 rounded-xl text-xs text-lime-400 font-medium text-center">
                                הנתונים נשמרים זמנית ומעדכנים את כל מסכי האפליקציה באייפון!
                            </div>
                        </div>
                    )}

                    {/* BOTTOM NAV BAR */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-2xl border-t border-slate-900 p-2 flex justify-around items-center max-w-md mx-auto z-50">
                        <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'dashboard' ? 'text-lime-400 font-bold' : 'text-gray-500 hover:text-gray-300'}`}>
                            <span className="text-xs">📊 דאשבורד</span>
                        </button>
                        <button onClick={() => setActiveTab('diary')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'diary' ? 'text-lime-400 font-bold' : 'text-gray-500 hover:text-gray-300'}`}>
                            <span className="text-xs">🍽️ יומן אוכל</span>
                        </button>
                        <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'settings' ? 'text-lime-400 font-bold' : 'text-gray-500 hover:text-gray-300'}`}>
                            <span className="text-xs">⚙️ הגדרות</span>
                        </button>
                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
